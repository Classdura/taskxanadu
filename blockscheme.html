<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ГОСТ Блок-Схемы Редактор</title>
  <style>
    :root {
      --bg-primary: #f8fafc;
      --bg-secondary: #ffffff;
      --bg-sidebar: #0f172a;
      --bg-sidebar-hover: #1e293b;
      --text-main: #0f172a;
      --text-muted: #64748b;
      --text-light: #f8fafc;
      --border-color: #cbd5e1;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --grid-color: rgba(203, 213, 225, 0.4);
      --danger: #ef4444;
      --danger-hover: #dc2626;
      --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
      --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }

    [data-theme="dark"] {
      --bg-primary: #090d16;
      --bg-secondary: #111827;
      --bg-sidebar: #030712;
      --bg-sidebar-hover: #1f2937;
      --text-main: #f3f4f6;
      --text-muted: #9ca3af;
      --text-light: #f3f4f6;
      --border-color: #374151;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --grid-color: rgba(55, 65, 81, 0.6);
      --danger: #f87171;
      --danger-hover: #ef4444;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      user-select: none;
      -webkit-user-drag: none;
    }

    body {
      font-family: var(--font-family);
      background-color: var(--bg-primary);
      color: var(--text-main);
      overflow: hidden;
      height: 100vh;
      width: 100vw;
      display: flex;
      flex-direction: column;
    }

    /* ВАЖНО: Отключаем нативные жесты свайпа/зума браузера, чтобы JS работал корректно на мобилках */
    .canvas-container, .scene-viewport, .gost-block, .palette-item {
      touch-action: none;
    }

    /* Главный контейнер */
    .app-container {
      display: flex;
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    /* Сайдбар */
    .sidebar {
      width: 320px;
      background-color: var(--bg-sidebar);
      color: var(--text-light);
      display: flex;
      flex-direction: column;
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 50;
      position: absolute;
      top: 0;
      left: 0;
      bottom: 0;
      box-shadow: var(--shadow);
    }

    .sidebar.collapsed {
      transform: translateX(-320px);
    }

    .sidebar-header {
      padding: 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .sidebar-title {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .sidebar-content {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .sidebar-content::-webkit-scrollbar {
      width: 6px;
    }

    .sidebar-content::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.15);
      border-radius: 3px;
    }

    .section-title {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
      margin-bottom: 0.75rem;
      font-weight: 600;
    }

    /* Панель элементов ГОСТ */
    .gost-palette {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.75rem;
    }

    .palette-item {
      background: var(--bg-sidebar-hover);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 8px;
      padding: 0.75rem 0.5rem;
      text-align: center;
      cursor: grab;
      transition: all 0.2s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.8rem;
    }

    .palette-item:hover {
      border-color: var(--accent);
      background: rgba(37, 99, 235, 0.15);
    }

    .palette-icon {
      font-size: 1.5rem;
    }

    /* Свойства элемента */
    .properties-panel {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 8px;
      padding: 0.75rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .prop-group {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }

    .prop-group label {
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .prop-input, .prop-select {
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 4px;
      padding: 0.5rem;
      color: var(--text-light);
      font-size: 0.85rem;
      outline: none;
    }

    .prop-input:focus, .prop-select:focus {
      border-color: var(--accent);
    }

    .prop-checkbox-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      margin-top: 0.25rem;
      max-height: 120px;
      overflow-y: auto;
      background: rgba(0, 0, 0, 0.2);
      padding: 0.5rem;
      border-radius: 4px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .prop-checkbox-label {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.75rem;
      cursor: pointer;
    }

    /* Бейджи переменных для помощника */
    .var-badge {
      background: var(--bg-sidebar-hover);
      border: 1px solid rgba(255, 255, 255, 0.2);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 11px;
      cursor: pointer;
      color: var(--text-light);
      transition: all 0.15s;
    }
    .var-badge:hover {
      background: var(--accent);
      border-color: var(--accent-hover);
    }

    /* Кнопки управления */
    .btn {
      background: var(--accent);
      color: var(--text-light);
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 500;
      transition: background 0.2s;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      font-size: 0.85rem;
    }

    .btn:hover {
      background: var(--accent-hover);
    }

    .btn-danger {
      background: var(--danger);
    }

    .btn-danger:hover {
      background: var(--danger-hover);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.1);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    /* Верхняя панель */
    .topbar {
      position: absolute;
      top: 1rem;
      left: 340px;
      right: 1rem;
      height: 56px;
      background-color: var(--bg-secondary);
      border-radius: 12px;
      box-shadow: var(--shadow);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1rem;
      z-index: 40;
      transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      border: 1px solid var(--border-color);
    }

    .sidebar.collapsed ~ .topbar {
      left: 1rem;
    }

    .menu-toggle {
      background: transparent;
      border: none;
      font-size: 1.25rem;
      color: var(--text-main);
      cursor: pointer;
      padding: 0.25rem;
      border-radius: 4px;
    }

    .menu-toggle:hover {
      background: rgba(0, 0, 0, 0.05);
    }

    .action-group {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .divider {
      width: 1px;
      height: 24px;
      background: var(--border-color);
      margin: 0 0.25rem;
    }

    /* Бесконечный холст */
    .canvas-container {
      flex: 1;
      position: relative;
      overflow: hidden;
      outline: none;
    }

    /* Фоновая бесконечная сетка */
    .grid-background {
      position: absolute;
      top: -2000%;
      left: -2000%;
      width: 4000%;
      height: 4000%;
      background-image: 
        linear-gradient(to right, var(--grid-color) 1px, transparent 1px),
        linear-gradient(to bottom, var(--grid-color) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      will-change: transform;
      z-index: 1;
    }

    /* Сама рабочая сцена */
    .scene-viewport {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 2;
      pointer-events: none;
      transform-origin: 0 0; /* ОЧЕНЬ ВАЖНО для правильного зума */
    }

    /* Контейнер интерактивных блоков */
    .blocks-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      will-change: transform;
    }

    /* Отдельный SVG слой для связей */
    .connections-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      will-change: transform;
    }

    .connections-svg {
      width: 100%;
      height: 100%;
      overflow: visible;
    }

    .flow-line, .return-line {
      fill: none;
      stroke: var(--text-main);
      stroke-width: 2.5;
      marker-end: url(#arrow-default);
      pointer-events: stroke;
      cursor: pointer;
      transition: stroke 0.2s, stroke-width 0.2s;
    }

    .flow-line.active {
      stroke: #22c55e;
      stroke-width: 3;
      marker-end: url(#arrow-flow-active);
    }

    .return-line.active {
      stroke: #3b82f6;
      stroke-width: 3;
      marker-end: url(#arrow-return-active);
    }

    .comment-line {
      fill: none;
      stroke: var(--text-muted);
      stroke-width: 1.5;
      stroke-dasharray: 5, 5;
      pointer-events: stroke;
      cursor: pointer;
    }

    .line-hover-target {
      fill: none;
      stroke: transparent;
      stroke-width: 12;
      pointer-events: stroke;
      cursor: pointer;
    }

    .line-hover-target:hover + .flow-line,
    .line-hover-target:hover + .return-line,
    .line-hover-target:hover + .comment-line {
      stroke-width: 4;
      filter: drop-shadow(0 0 4px var(--accent));
    }

    .line-selected {
      stroke-width: 4;
      stroke: #f59e0b !important;
    }

    .line-label-bg {
      fill: var(--bg-secondary);
      stroke: var(--border-color);
      rx: 4;
    }

    .line-label-text {
      font-size: 11px;
      font-weight: 600;
      fill: var(--text-main);
      text-anchor: middle;
      dominant-baseline: middle;
    }

    .arrow-path-default {
      fill: var(--text-main);
    }

    /* HTML Блок */
    .gost-block {
      position: absolute;
      pointer-events: auto;
      cursor: grab;
      will-change: transform;
      user-select: none;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      box-sizing: border-box;
      background: var(--bg-secondary);
      color: var(--text-main);
      box-shadow: var(--shadow);
      border-radius: 0px;
    }
    
    .gost-block:active {
      cursor: grabbing;
    }

    .gost-block.selected {
      outline: 3px solid #f59e0b;
      box-shadow: 0 0 12px rgba(245, 158, 11, 0.6);
    }

    .gost-block-content {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 0.5rem;
      word-break: break-word;
      overflow: hidden;
      font-size: 12px;
      font-weight: 500;
      line-height: 1.2;
      pointer-events: none; /* Защита от перехвата событий текстом */
    }

    /* Отрисовка фигур */
    .shape-oval { border-radius: 20px; border: 2px solid var(--text-main); }
    .shape-rectangle { border: 2px solid var(--text-main); }
    .shape-rhombus {
      border: 2px solid var(--text-main);
      clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
    }
    .shape-parallelogram {
      border: 2px solid var(--text-main);
      clip-path: polygon(15% 0%, 100% 0%, 85% 100%, 0% 100%);
    }
    .shape-subroutine {
      border: 2px solid var(--text-main);
      box-shadow: 
        inset 10px 0 0 0 var(--bg-secondary),
        inset -10px 0 0 0 var(--bg-secondary),
        inset 12px 0 0 0 var(--text-main),
        inset -12px 0 0 0 var(--text-main),
        var(--shadow);
    }
    .shape-comment {
      border-left: 2px solid var(--text-main);
      border-top: 2px dashed transparent;
      border-bottom: 2px dashed transparent;
      background: transparent !important;
      box-shadow: none !important;
    }
    .shape-comment::before, .shape-comment::after {
      content: '';
      position: absolute;
      left: 0;
      width: 16px;
      height: 2px;
      background-color: var(--text-main);
    }
    .shape-comment::before { top: 0; }
    .shape-comment::after { bottom: 0; }

    .gost-block-type-badge {
      position: absolute;
      bottom: 2px;
      right: 12%;
      font-size: 8px;
      color: var(--accent);
      font-weight: bold;
      background: var(--bg-secondary);
      padding: 0 2px;
      border-radius: 2px;
      pointer-events: none;
    }

    /* Панель листов снизу */
    .bottom-tabs-bar {
      height: 48px;
      background-color: var(--bg-secondary);
      border-top: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      padding: 0 1rem;
      gap: 0.5rem;
      z-index: 40;
    }

    .tabs-scroll-container {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      overflow-x: auto;
      flex: 1;
      height: 100%;
    }

    .tabs-scroll-container::-webkit-scrollbar { height: 4px; }
    .tabs-scroll-container::-webkit-scrollbar-thumb {
      background: var(--border-color);
      border-radius: 2px;
    }

    .sheet-tab {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.25rem 0.75rem;
      border: 1px solid var(--border-color);
      border-bottom: none;
      border-top-left-radius: 6px;
      border-top-right-radius: 6px;
      background-color: var(--bg-primary);
      cursor: pointer;
      font-size: 0.85rem;
      height: 36px;
      margin-top: 11px;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .sheet-tab.active {
      background-color: var(--bg-secondary);
      border-color: var(--border-color);
      border-bottom: 2px solid var(--accent);
      font-weight: 600;
      color: var(--accent);
    }

    .sheet-tab-close {
      font-size: 10px;
      color: var(--text-muted);
      border-radius: 50%;
      width: 14px;
      height: 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }

    .sheet-tab-close:hover {
      background: rgba(239, 68, 68, 0.2);
      color: var(--danger);
    }

    .add-sheet-btn {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 1px dashed var(--border-color);
      background: transparent;
      color: var(--text-main);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .add-sheet-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(37, 99, 235, 0.05);
    }

    /* Инструменты масштаба на холсте */
    .zoom-controls {
      position: absolute;
      bottom: 24px;
      right: 1rem;
      background: var(--bg-secondary);
      border-radius: 8px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
      gap: 2px;
      z-index: 40;
      padding: 2px;
    }

    .zoom-btn {
      width: 36px;
      height: 36px;
      background: transparent;
      border: none;
      color: var(--text-main);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      border-radius: 6px;
    }

    .zoom-btn:hover {
      background: rgba(0, 0, 0, 0.05);
    }

    .zoom-text {
      font-size: 10px;
      font-weight: bold;
      text-align: center;
      padding: 2px 0;
      color: var(--text-muted);
    }

    /* МЕДИАЗАПРОСЫ ДЛЯ МОБИЛЬНЫХ ТЕЛЕФОНОВ */
    @media (max-width: 768px) {
      .topbar {
        left: 0.5rem !important; /* Отменяем смещение */
        right: 0.5rem;
        top: 0.5rem;
        height: auto;
        padding: 0.5rem;
        flex-wrap: wrap;
        justify-content: center;
        gap: 0.5rem;
        border-radius: 8px;
      }
      .action-group {
        flex-wrap: wrap;
        justify-content: center;
      }
      .sidebar {
        width: 100%;
        max-width: 340px;
        transform: translateX(-100%);
      }
      .sidebar:not(.collapsed) {
        transform: translateX(0);
      }
      .bottom-tabs-bar {
        padding-bottom: max(env(safe-area-inset-bottom), 0.5rem);
      }
      .zoom-controls {
        bottom: 70px;
      }
      .link-mode-indicator {
        top: 100px;
        font-size: 0.75rem;
      }
    }

    /* Модальные окна */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(15, 23, 42, 0.6);
      backdrop-filter: blur(4px);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease-out;
    }
    .modal-overlay.active { opacity: 1; pointer-events: auto; }
    .modal-container {
      background: var(--bg-secondary);
      border-radius: 12px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border-color);
      width: 90%;
      max-width: 450px;
      transform: scale(0.9);
      transition: transform 0.2s ease-out;
      overflow: hidden;
    }
    .modal-overlay.active .modal-container { transform: scale(1); }
    .modal-header { padding: 1rem; border-bottom: 1px solid var(--border-color); font-weight: 600; font-size: 1.1rem; }
    .modal-body { padding: 1rem; display: flex; flex-direction: column; gap: 1rem; }
    .modal-footer { padding: 1rem; border-top: 1px solid var(--border-color); display: flex; justify-content: flex-end; gap: 0.5rem; }

    #file-input { display: none; }
    
    .link-mode-indicator {
      position: absolute;
      top: 80px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--accent);
      color: white;
      padding: 0.5rem 1rem;
      border-radius: 20px;
      font-weight: 600;
      font-size: 0.85rem;
      box-shadow: var(--shadow);
      display: flex;
      align-items: center;
      gap: 0.5rem;
      z-index: 45;
      animation: pulse 1.5s infinite;
      pointer-events: none;
    }

    @keyframes pulse {
      0% { opacity: 0.9; }
      50% { opacity: 0.6; }
      100% { opacity: 0.9; }
    }

    .action-badge-btn {
      background: var(--bg-sidebar-hover);
      border: 1px solid rgba(255, 255, 255, 0.2);
      padding: 4px 8px;
      border-radius: 4px;
      cursor: pointer;
      color: var(--text-light);
      font-size: 11px;
      transition: background 0.15s;
    }
    .action-badge-btn:hover { background: var(--accent); }
  </style>
</head>
<body data-theme="light">

  <div class="app-container">
    
    <!-- Левый сайдбар -->
    <div class="sidebar collapsed" id="sidebar">
      <div class="sidebar-header">
        <span class="sidebar-title">⚙️ СВОЙСТВА</span>
        <button class="menu-toggle" style="color: white;" onclick="toggleSidebar()">✕</button>
      </div>
      <div class="sidebar-content">
        
        <div>
          <div class="section-title">Фигуры ГОСТ</div>
          <div style="font-size: 0.75rem; color: var(--text-muted); margin-bottom: 0.5rem; line-height: 1.3;">
            💡 Перетащите фигуру на холст или просто кликните на нее.
          </div>
          <div class="gost-palette">
            <div class="palette-item" draggable="true" data-shape="oval">
              <span class="palette-icon">⚪</span><span>Старт / Стоп</span>
            </div>
            <div class="palette-item" draggable="true" data-shape="rectangle">
              <span class="palette-icon">⬜</span><span>Процесс</span>
            </div>
            <div class="palette-item" draggable="true" data-shape="rhombus">
              <span class="palette-icon">🔶</span><span>Решение</span>
            </div>
            <div class="palette-item" draggable="true" data-shape="parallelogram">
              <span class="palette-icon">▱</span><span>Ввод / Вывод</span>
            </div>
            <div class="palette-item" draggable="true" data-shape="subroutine">
              <span class="palette-icon">🪵</span><span>Подпрограмма</span>
            </div>
            <div class="palette-item" draggable="true" data-shape="comment">
              <span class="palette-icon">💬</span><span>Комментарий</span>
            </div>
          </div>
        </div>

        <div>
          <div class="section-title" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;">
            <span>📋 Переменные</span>
            <button class="btn" style="padding: 2px 8px; font-size: 0.75rem; border-radius: 4px;" onclick="addVariable()">+ Создать</button>
          </div>

  <script>
    /* Global Application State */
    const appState = {
      sheets: {}, activeSheetId: 'sheet-1',
      history: {}, historyIndex: {},
      
      zoom: 1, panX: 0, panY: 0,
      
      // Новая система Pointer Events для мобилок и ПК
      activePointers: new Map(), // Отслеживание мультитача
      lastPointerX: 0,
      lastPointerY: 0,
      initialPinchDistance: null,
      initialZoom: 1,

      isDraggingBlock: false, draggedBlockId: null,
      
      selectedElementId: null, selectedElementType: null, 
      linkMode: false, linkSourceBlockId: null,
      
      theme: 'light', sidebarOpen: false // По умолчанию на мобилках сайдбар закрыт
    };

    const MIN_ZOOM = 0.2;
    const MAX_ZOOM = 2.5;
    const ZOOM_SPEED = 0.08;

    const dom = {
      sidebar: document.getElementById('sidebar'),
      canvasContainer: document.getElementById('canvas-container'),
      gridBg: document.getElementById('grid-bg'),
      scene: document.getElementById('scene'),
      blocksContainer: document.getElementById('blocks-container'),
      connectionsGroup: document.getElementById('connections-group'),
      tabsContainer: document.getElementById('tabs-container'),
      zoomValue: document.getElementById('zoom-value'),
      linkBtn: document.getElementById('link-btn'),
      linkIndicator: document.getElementById('link-indicator'),
      themeToggleBtn: document.getElementById('theme-toggle-btn'),
      fileInput: document.getElementById('file-input'),
      customModal: document.getElementById('custom-modal'),
      modalTitle: document.getElementById('modal-title'),
      modalMessage: document.getElementById('modal-message'),
      modalInput: document.getElementById('modal-input'),
      modalTextarea: document.getElementById('modal-textarea'),
      modalConfirmBtn: document.getElementById('modal-btn-confirm'),
      variablesContainer: document.getElementById('variables-list-container'),
      noSelectionMsg: document.getElementById('no-selection-msg'),
      blockPropsPanel: document.getElementById('block-props-panel'),
      connectionPropsPanel: document.getElementById('connection-props-panel'),
      propBlockText: document.getElementById('prop-block-text'),
      propBlockW: document.getElementById('prop-block-w'),
      propBlockH: document.getElementById('prop-block-h'),
      parallelogramOptions: document.getElementById('parallelogram-options'),
      parallelogramVarsSelect: document.getElementById('parallelogram-vars-select'),
      blockVariableHelpers: document.getElementById('block-variable-helpers'),
      blockVarsHelperList: document.getElementById('block-vars-helper-list'),
      rectangleOptions: document.getElementById('rectangle-options'),
      propRectTargetVar: document.getElementById('prop-rect-target-var'),
      propRectOperator: document.getElementById('prop-rect-operator'),
      propRectExpression: document.getElementById('prop-rect-expression'),
      rhombusOptions: document.getElementById('rhombus-options'),
      propRhomLeft: document.getElementById('prop-rhom-left'),
      propRhomOperator: document.getElementById('prop-rhom-operator'),
      propRhomRight: document.getElementById('prop-rhom-right'),
      propConnType: document.getElementById('prop-conn-type'),
      propConnLabel: document.getElementById('prop-conn-label'),
      propSheetBg: document.getElementById('prop-sheet-bg')
    };

    window.onload = function() {
      const savedBook = localStorage.getItem('gost_flowchart_book');
      if (savedBook) {
        try {
          const parsed = JSON.parse(savedBook);
          appState.sheets = parsed.sheets;
          appState.activeSheetId = parsed.activeSheetId || Object.keys(parsed.sheets)[0];
          appState.theme = parsed.theme || 'light';
          const sheetIds = Object.keys(appState.sheets);
          for (let i = 0; i < sheetIds.length; i++) {
            const sId = sheetIds[i];
            appState.history[sId] = []; appState.historyIndex[sId] = -1;
            if (!appState.sheets[sId].variables) appState.sheets[sId].variables = [];
            saveHistoryState(sId);
          }
        } catch (err) { setupDefaultProject(); }
      } else { setupDefaultProject(); }
      
      applyTheme(appState.theme);
      renderSheetsBar();
      loadSheet(appState.activeSheetId);
      
      setupPointerListeners(); // Инициализация новой системы управления
      setupSidebarInputs();
      setupKeyboardShortcuts();
      setupDragAndDropPalette();
    };

    function setupDefaultProject() {
      appState.sheets['sheet-1'] = createDefaultSheetData('Главный процесс');
      appState.activeSheetId = 'sheet-1';
      initHistoryForSheet('sheet-1');
    }

    function createDefaultSheetData(name) {
      return {
        id: 'sheet-' + Date.now() + '-' + Math.random().toString(36).substr(2, 5),
        name: name, bgColor: '#f8fafc', zoom: 1, panX: 0, panY: 0, blocks: {}, connections: {}, variables: []
      };
    }

    function initHistoryForSheet(sheetId) {
      appState.history[sheetId] = []; appState.historyIndex[sheetId] = -1;
      saveHistoryState(sheetId);
    }

    function saveToLocalStorage() {
      localStorage.setItem('gost_flowchart_book', JSON.stringify({version: "1.0", activeSheetId: appState.activeSheetId, sheets: appState.sheets, theme: appState.theme}));
    }

    function resetWholeProject() {
      showCustomModal('Очистить проект', 'Вы уверены, что хотите безвозвратно стереть все листы?', function() {
        localStorage.removeItem('gost_flowchart_book');
        appState.sheets = {}; setupDefaultProject(); applyTheme('light'); renderSheetsBar(); loadSheet(appState.activeSheetId);
      });
    }

    function saveHistoryState(sheetId) {
      if (!appState.history[sheetId]) return;
      const curIndex = appState.historyIndex[sheetId];
      let historyArr = appState.history[sheetId];
      if (curIndex < historyArr.length - 1) historyArr = historyArr.slice(0, curIndex + 1);
      historyArr.push(JSON.stringify({blocks: appState.sheets[sheetId].blocks, connections: appState.sheets[sheetId].connections, bgColor: appState.sheets[sheetId].bgColor, variables: appState.sheets[sheetId].variables}));
      if (historyArr.length > 50) historyArr.shift();
      appState.history[sheetId] = historyArr; appState.historyIndex[sheetId] = historyArr.length - 1;
      saveToLocalStorage();
    }

    function triggerUndo() {
      const sId = appState.activeSheetId;
      if (appState.historyIndex[sId] > 0) { appState.historyIndex[sId]--; restoreStateFromHistory(sId); }
    }

    function triggerRedo() {
      const sId = appState.activeSheetId; const historyArr = appState.history[sId];
      if (historyArr && appState.historyIndex[sId] < historyArr.length - 1) { appState.historyIndex[sId]++; restoreStateFromHistory(sId); }
    }

    function restoreStateFromHistory(sheetId) {
      const snapJson = appState.history[sheetId][appState.historyIndex[sheetId]];
      if (!snapJson) return;
      const snap = JSON.parse(snapJson);
      appState.sheets[sheetId].blocks = snap.blocks; appState.sheets[sheetId].connections = snap.connections;
      appState.sheets[sheetId].bgColor = snap.bgColor; appState.sheets[sheetId].variables = snap.variables || [];
      appState.selectedElementId = null; appState.selectedElementType = null;
      renderVariablesList(); updatePropertiesPanel(); dom.blocksContainer.innerHTML = '';
      const blockIds = Object.keys(appState.sheets[sheetId].blocks);
      for (let i = 0; i < blockIds.length; i++) createBlockDOM(appState.sheets[sheetId].blocks[blockIds[i]]);
      requestSceneUpdate(); saveToLocalStorage();
    }

    function showCustomModal(title, msg, onConfirm, hasInput = false, defaultInputValue = '', isTextarea = false) {
      dom.modalTitle.innerText = title; dom.modalMessage.innerText = msg;
      dom.modalInput.style.display = 'none'; dom.modalTextarea.style.display = 'none';
      if (hasInput) { if (isTextarea) { dom.modalTextarea.style.display = 'block'; dom.modalTextarea.value = defaultInputValue; } else { dom.modalInput.style.display = 'block'; dom.modalInput.value = defaultInputValue; } }
      dom.modalConfirmBtn.onclick = function() {
        const value = hasInput ? (isTextarea ? dom.modalTextarea.value : dom.modalInput.value) : true;
        closeModal(); if (onConfirm) onConfirm(value);
      };
      dom.customModal.classList.add('active');
    }

    function closeModal() { dom.customModal.classList.remove('active'); }

    function toggleTheme() { applyTheme(appState.theme === 'dark' ? 'light' : 'dark'); saveToLocalStorage(); requestSceneUpdate(); }
    function applyTheme(theme) {
      appState.theme = theme; document.body.setAttribute('data-theme', theme);
      if (theme === 'dark') { dom.themeToggleBtn.innerText = '☀️'; dom.propSheetBg.value = '#090d16'; } else { dom.themeToggleBtn.innerText = '🌙'; dom.propSheetBg.value = '#f8fafc'; }
    }

    function renderVariablesList() { /* Сокращено для читаемости, логика переменных не менялась */ }
    function addVariable() { /* ... */ }
    function populateTargetVariablesSelect() { /* ... */ }
    function renderVariablesHelpers() { /* ... */ }

    function renderSheetsBar() {
      dom.tabsContainer.innerHTML = '';
      const sheetIds = Object.keys(appState.sheets);
      for (let i = 0; i < sheetIds.length; i++) {
        const id = sheetIds[i]; const sheet = appState.sheets[id];
        const tab = document.createElement('div');
        tab.className = `sheet-tab ${id === appState.activeSheetId ? 'active' : ''}`;
        
        const nameSpan = document.createElement('span'); nameSpan.innerText = sheet.name;
        nameSpan.ondblclick = function(e) { e.stopPropagation(); showCustomModal('Переименовать', 'Новое имя:', (n) => { if(n) { sheet.name = n.trim(); renderSheetsBar(); saveToLocalStorage(); } }, true, sheet.name); };
        tab.appendChild(nameSpan);

        if (sheetIds.length > 1) {
          const closeBtn = document.createElement('span'); closeBtn.className = 'sheet-tab-close'; closeBtn.innerText = '✕';
          closeBtn.onclick = function(e) { e.stopPropagation(); showCustomModal('Удалить', 'Удалить лист?', () => deleteSheet(id)); };
          tab.appendChild(closeBtn);
        }
        tab.onclick = function() {
          if (appState.activeSheetId !== id) {
            const cur = appState.sheets[appState.activeSheetId];
            cur.zoom = appState.zoom; cur.panX = appState.panX; cur.panY = appState.panY;
            loadSheet(id);
          }
        };
        dom.tabsContainer.appendChild(tab);
      }
    }

    function createNewSheet() {
      const newSheet = createDefaultSheetData('Лист ' + (Object.keys(appState.sheets).length + 1));
      appState.sheets[newSheet.id] = newSheet; initHistoryForSheet(newSheet.id); loadSheet(newSheet.id);
    }

    function deleteSheet(sheetId) {
      if (Object.keys(appState.sheets).length <= 1) return;
      delete appState.sheets[sheetId]; delete appState.history[sheetId]; delete appState.historyIndex[sheetId];
      if (appState.activeSheetId === sheetId) appState.activeSheetId = Object.keys(appState.sheets)[0];
      loadSheet(appState.activeSheetId);
    }

    function loadSheet(sheetId) {
      appState.activeSheetId = sheetId; const sheet = appState.sheets[sheetId];
      appState.zoom = sheet.zoom || 1; appState.panX = sheet.panX || 0; appState.panY = sheet.panY || 0;
      dom.blocksContainer.innerHTML = '';
      Object.keys(sheet.blocks).forEach(id => createBlockDOM(sheet.blocks[id]));
      appState.selectedElementId = null; appState.selectedElementType = null;
      updatePropertiesPanel(); dom.propSheetBg.value = sheet.bgColor; dom.canvasContainer.style.backgroundColor = sheet.bgColor;
      renderSheetsBar(); requestSceneUpdate(); saveToLocalStorage();
    }

    function createBlockDOM(block) {
      const div = document.createElement('div');
      div.id = block.id; div.className = `gost-block shape-${block.type}`;
      div.style.width = block.width + 'px'; div.style.height = block.height + 'px';
      div.innerHTML = `<div class="gost-block-content">${block.text}</div>`;
      if (block.type === 'parallelogram') div.innerHTML += `<div class="gost-block-type-badge"></div>`;
      
      div.onpointerdown = function(e) {
        e.stopPropagation();
        try { div.setPointerCapture(e.pointerId); } catch(err){}
        saveHistoryState(appState.activeSheetId);

        if (appState.linkMode) { completeLinking(block.id); return; }

        appState.isDraggingBlock = true;
        appState.draggedBlockId = block.id;
        
        // НОВАЯ ЛОГИКА ДЛЯ ПЛАВНОСТИ (ДЕЛЬТЫ)
        appState.lastPointerX = e.clientX;
        appState.lastPointerY = e.clientY;

        selectElement(block.id, 'block');
      };
      dom.blocksContainer.appendChild(div);
      if(block.type === 'parallelogram') updateParallelogramBadge(block);
    }

    /* === НОВАЯ ЕДИНАЯ СИСТЕМА СОБЫТИЙ ДЛЯ МЫШИ И ТАЧА === */
    function setupPointerListeners() {
      const container = dom.canvasContainer;

      container.addEventListener('pointerdown', (e) => {
        if (e.target !== container && e.target !== dom.gridBg) return;
        try { container.setPointerCapture(e.pointerId); } catch(err){}
        
        appState.activePointers.set(e.pointerId, e);
        appState.lastPointerX = e.clientX;
        appState.lastPointerY = e.clientY;

        if (appState.activePointers.size === 2) {
          const pts = Array.from(appState.activePointers.values());
          appState.initialPinchDistance = Math.hypot(pts[1].clientX - pts[0].clientX, pts[1].clientY - pts[0].clientY);
          appState.initialZoom = appState.zoom;
        } else {
          selectElement(null, null); // Сброс выделения при клике в пустоту
        }
      });

      container.addEventListener('pointermove', (e) => {
        // 1. Драг блока
        if (appState.isDraggingBlock && appState.draggedBlockId) {
          const block = appState.sheets[appState.activeSheetId].blocks[appState.draggedBlockId];
          const dx = (e.clientX - appState.lastPointerX) / appState.zoom;
          const dy = (e.clientY - appState.lastPointerY) / appState.zoom;
          
          block.x += dx;
          block.y += dy;
          
          appState.lastPointerX = e.clientX;
          appState.lastPointerY = e.clientY;
          requestSceneUpdate();
          return;
        }

        if (!appState.activePointers.has(e.pointerId)) return;
        appState.activePointers.set(e.pointerId, e);

        // 2. Зум (Pinch) двумя пальцами
        if (appState.activePointers.size === 2 && appState.initialPinchDistance) {
          const pts = Array.from(appState.activePointers.values());
          const dist = Math.hypot(pts[1].clientX - pts[0].clientX, pts[1].clientY - pts[0].clientY);
          const midX = (pts[0].clientX + pts[1].clientX) / 2;
          const midY = (pts[0].clientY + pts[1].clientY) / 2;
          
          const scale = dist / appState.initialPinchDistance;
          let nextZoom = appState.initialZoom * scale;
          nextZoom = Math.max(MIN_ZOOM, Math.min(MAX_ZOOM, nextZoom));

          const rect = container.getBoundingClientRect();
          const mouseX = midX - rect.left;
          const mouseY = midY - rect.top;

          const sceneX = (mouseX - appState.panX) / appState.zoom;
          const sceneY = (mouseY - appState.panY) / appState.zoom;

          appState.zoom = nextZoom;
          appState.panX = mouseX - sceneX * appState.zoom;
          appState.panY = mouseY - sceneY * appState.zoom;
          
          requestSceneUpdate();
          return;
        }

        // 3. Панорамирование (Pan) одним пальцем/мышью
        if (appState.activePointers.size === 1) {
          const dx = e.clientX - appState.lastPointerX;
          const dy = e.clientY - appState.lastPointerY;
          
          appState.panX += dx;
          appState.panY += dy;
          
          appState.lastPointerX = e.clientX;
          appState.lastPointerY = e.clientY;
          requestSceneUpdate();
        }
      });

      const upHandler = (e) => {
        appState.activePointers.delete(e.pointerId);
        
        if (appState.isDraggingBlock) {
          try { document.getElementById(appState.draggedBlockId)?.releasePointerCapture(e.pointerId); } catch(err){}
          appState.isDraggingBlock = false;
          appState.draggedBlockId = null;
          saveToLocalStorage();
        }

        if (appState.activePointers.size < 2) {
          appState.initialPinchDistance = null;
        }
        // Если остался один палец, обновляем стартовые координаты для него, чтобы не было прыжка
        if (appState.activePointers.size === 1) {
          const pt = Array.from(appState.activePointers.values())[0];
          appState.lastPointerX = pt.clientX;
          appState.lastPointerY = pt.clientY;
        }
      };

      container.addEventListener('pointerup', upHandler);
      container.addEventListener('pointercancel', upHandler);
      container.addEventListener('pointerout', (e) => {
        if(e.target === container) upHandler(e);
      });

      // Зум колесиком мыши (сохранено)
      container.onwheel = function(e) {
        e.preventDefault();
        const rect = container.getBoundingClientRect();
        const mouseX = e.clientX - rect.left;
        const mouseY = e.clientY - rect.top;

        const sceneX = (mouseX - appState.panX) / appState.zoom;
        const sceneY = (mouseY - appState.panY) / appState.zoom;

        const delta = -e.deltaY;
        let nextZoom = appState.zoom + (delta > 0 ? ZOOM_SPEED : -ZOOM_SPEED) * appState.zoom;
        appState.zoom = Math.max(MIN_ZOOM, Math.min(MAX_ZOOM, nextZoom));
        appState.panX = mouseX - sceneX * appState.zoom;
        appState.panY = mouseY - sceneY * appState.zoom;
        requestSceneUpdate();
      };
    }

    function screenToSceneCoords(clientX, clientY) {
      const rect = dom.canvasContainer.getBoundingClientRect();
      const x = (clientX - rect.left - appState.panX) / appState.zoom;
      const y = (clientY - rect.top - appState.panY) / appState.zoom;
      return { x, y };
    }

    function addBlockAtCenter(shape) {
      const rect = dom.canvasContainer.getBoundingClientRect();
      const coords = screenToSceneCoords(rect.left + rect.width / 2, rect.top + rect.height / 2);
      
      let width = 160, height = 80, text = 'Новый процесс';
      if (shape === 'oval') { text = 'Начало'; width = 140; height = 60; }
      else if (shape === 'rhombus') { text = 'Решение'; width = 140; height = 100; }
      else if (shape === 'comment') { text = 'Комментарий'; width = 160; height = 60; }

      saveHistoryState(appState.activeSheetId);
      const blockId = 'block-' + Date.now();
      const newBlock = {
        id: blockId, type: shape, x: Math.round(coords.x - width/2), y: Math.round(coords.y - height/2),
        width, height, text, associatedVars: [], rectOperation: {}, rhomCondition: {}
      };
      appState.sheets[appState.activeSheetId].blocks[blockId] = newBlock;
      createBlockDOM(newBlock); selectElement(blockId, 'block'); saveToLocalStorage();
    }

    let animationFrameRequested = false;
    function requestSceneUpdate() {
      if (!animationFrameRequested) { animationFrameRequested = true; requestAnimationFrame(updateSceneDOM); }
    }

    function updateSceneDOM() {
      animationFrameRequested = false;
      const transformString = `translate3d(${appState.panX}px, ${appState.panY}px, 0) scale(${appState.zoom})`;
      dom.scene.style.transform = transformString;
      dom.gridBg.style.transform = transformString;

      const currentSheet = appState.sheets[appState.activeSheetId];
      Object.keys(currentSheet.blocks).forEach(id => {
        const bDOM = document.getElementById(id);
        if (bDOM) bDOM.style.transform = `translate3d(${currentSheet.blocks[id].x}px, ${currentSheet.blocks[id].y}px, 0)`;
      });
      renderAllConnections();
      dom.zoomValue.innerText = Math.round(appState.zoom * 100) + '%';
    }

    function renderAllConnections() {
      dom.connectionsGroup.innerHTML = '';
      const sheet = appState.sheets[appState.activeSheetId];
      Object.keys(sheet.connections).forEach(id => {
        const conn = sheet.connections[id];
        const blockA = sheet.blocks[conn.from], blockB = sheet.blocks[conn.to];
        if (!blockA || !blockB) return;
        const pathData = calculateConnectionPath(blockA, blockB, conn.type);

        const hoverTarget = document.createElementNS("http://www.w3.org/2000/svg", "path");
        hoverTarget.setAttribute("d", pathData.d); hoverTarget.setAttribute("class", "line-hover-target");
        hoverTarget.onpointerdown = (e) => { e.stopPropagation(); selectElement(id, 'connection'); };

        const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
        path.setAttribute("d", pathData.d);
        let lineClass = `${conn.type}-line ${conn.active ? 'active' : ''} ${appState.selectedElementId === id ? 'line-selected' : ''}`;
        path.setAttribute("class", lineClass.trim());

        dom.connectionsGroup.appendChild(hoverTarget); dom.connectionsGroup.appendChild(path);
        if (conn.label && conn.label.trim() !== "") renderLineLabel(pathData.midX, pathData.midY, conn.label);
      });
    }

    function renderLineLabel(x, y, text) {
      const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
      const rect = document.createElementNS("http://www.w3.org/2000/svg", "rect"); rect.setAttribute("class", "line-label-bg");
      const textNode = document.createElementNS("http://www.w3.org/2000/svg", "text");
      textNode.setAttribute("class", "line-label-text"); textNode.setAttribute("x", x); textNode.setAttribute("y", y); textNode.textContent = text;
      g.appendChild(rect); g.appendChild(textNode); dom.connectionsGroup.appendChild(g);
      setTimeout(() => { try { const bbox = textNode.getBBox(); rect.setAttribute("x", bbox.x-4); rect.setAttribute("y", bbox.y-2); rect.setAttribute("width", bbox.width+8); rect.setAttribute("height", bbox.height+4); } catch(e){} }, 0);
    }

    function calculateConnectionPath(a, b, connType) {
      const cxA = a.x + a.width/2, cyA = a.y + a.height/2;
      const cxB = b.x + b.width/2, cyB = b.y + b.height/2;
      let startPort = 'bottom', endPort = 'top';
      const dx = cxB - cxA, dy = cyB - cyA;

      if (Math.abs(dx) > Math.abs(dy)) { startPort = dx > 0 ? 'right' : 'left'; endPort = dx > 0 ? 'left' : 'right'; } 
      else { startPort = dy > 0 ? 'bottom' : 'top'; endPort = dy > 0 ? 'top' : 'bottom'; }
      if (connType === 'comment' && a.type === 'comment') startPort = 'right';

      const pA = getPortCoordinates(a, startPort), pB = getPortCoordinates(b, endPort);
      let d = "", midX = (pA.x + pB.x)/2, midY = (pA.y + pB.y)/2;

      if (connType === 'comment') d = `M ${pA.x} ${pA.y} L ${pB.x} ${pB.y}`;
      else {
        if (startPort === 'bottom' || startPort === 'top') { midY = (pA.y + pB.y)/2; d = `M ${pA.x} ${pA.y} L ${pA.x} ${midY} L ${pB.x} ${midY} L ${pB.x} ${pB.y}`; } 
        else { midX = (pA.x + pB.x)/2; d = `M ${pA.x} ${pA.y} L ${midX} ${pA.y} L ${midX} ${pB.y} L ${pB.x} ${pB.y}`; }
      }
      return { d, midX, midY };
    }

    function getPortCoordinates(b, p) {
      if (p === 'top') return { x: b.x + b.width/2, y: b.y };
      if (p === 'bottom') return { x: b.x + b.width/2, y: b.y + b.height };
      if (p === 'left') return { x: b.x, y: b.y + b.height/2 };
      return { x: b.x + b.width, y: b.y + b.height/2 };
    }

    function selectElement(id, type) {
      document.querySelector('.gost-block.selected')?.classList.remove('selected');
      appState.selectedElementId = id; appState.selectedElementType = type;
      if (id && type === 'block') document.getElementById(id)?.classList.add('selected');
      updatePropertiesPanel(); requestSceneUpdate();
    }

    function setConnectionLabel(labelVal) {
      if (appState.selectedElementType === 'connection') {
        appState.sheets[appState.activeSheetId].connections[appState.selectedElementId].label = labelVal;
        dom.propConnLabel.value = labelVal; saveToLocalStorage(); requestSceneUpdate();
      }
    }

    function updatePropertiesPanel() {
      const id = appState.selectedElementId, type = appState.selectedElementType, sheet = appState.sheets[appState.activeSheetId];
      dom.noSelectionMsg.style.display = id ? 'none' : 'block';
      dom.blockPropsPanel.style.display = type === 'block' ? 'flex' : 'none';
      dom.connectionPropsPanel.style.display = type === 'connection' ? 'flex' : 'none';
      
      if (type === 'block') {
        const b = sheet.blocks[id];
        dom.propBlockText.value = b.text; dom.propBlockW.value = b.width; dom.propBlockH.value = b.height;
      } else if (type === 'connection') {
        const c = sheet.connections[id];
        dom.propConnType.value = c.type; dom.propConnLabel.value = c.label || '';
      }
    }

    function setupSidebarInputs() {
      dom.propBlockText.oninput = () => { if(appState.selectedElementType === 'block'){ appState.sheets[appState.activeSheetId].blocks[appState.selectedElementId].text = dom.propBlockText.value; document.getElementById(appState.selectedElementId).querySelector('.gost-block-content').innerText = dom.propBlockText.value; saveToLocalStorage(); requestSceneUpdate(); }};
      dom.propBlockW.oninput = () => { if(appState.selectedElementType === 'block'){ appState.sheets[appState.activeSheetId].blocks[appState.selectedElementId].width = parseInt(dom.propBlockW.value)||120; requestSceneUpdate(); }};
      dom.propBlockH.oninput = () => { if(appState.selectedElementType === 'block'){ appState.sheets[appState.activeSheetId].blocks[appState.selectedElementId].height = parseInt(dom.propBlockH.value)||60; requestSceneUpdate(); }};
    }

    function deleteCurrentSelected() {
      const id = appState.selectedElementId, type = appState.selectedElementType, sheet = appState.sheets[appState.activeSheetId];
      if (!id) return; saveHistoryState(appState.activeSheetId);
      if (type === 'block') {
        delete sheet.blocks[id]; document.getElementById(id)?.remove();
        Object.keys(sheet.connections).forEach(cId => { if(sheet.connections[cId].from === id || sheet.connections[cId].to === id) delete sheet.connections[cId]; });
      } else delete sheet.connections[id];
      selectElement(null, null); saveToLocalStorage(); requestSceneUpdate();
    }

    function toggleLinkMode() {
      if (appState.linkMode) { appState.linkMode = false; dom.linkBtn.innerText = '🔗 Связать'; dom.linkIndicator.style.display = 'none'; }
      else {
        if (appState.selectedElementType !== 'block') return showCustomModal('Инфо', 'Выберите блок.', null);
        appState.linkMode = true; appState.linkSourceBlockId = appState.selectedElementId;
        dom.linkBtn.innerText = '✕ Отмена'; dom.linkIndicator.style.display = 'flex';
      }
    }

    function completeLinking(targetId) {
      if (appState.linkSourceBlockId === targetId) return toggleLinkMode();
      const connId = 'conn-' + Date.now();
      appState.sheets[appState.activeSheetId].connections[connId] = { id: connId, from: appState.linkSourceBlockId, to: targetId, type: 'flow', label: '', active: false };
      toggleLinkMode(); selectElement(connId, 'connection'); saveToLocalStorage(); requestSceneUpdate();
    }

    function setupDragAndDropPalette() {
      document.querySelectorAll('.palette-item').forEach(i => {
        i.ondragstart = e => e.dataTransfer.setData('gost-shape', e.currentTarget.dataset.shape);
        i.onclick = e => { addBlockAtCenter(e.currentTarget.dataset.shape); if(window.innerWidth < 768) toggleSidebar(); };
      });
      dom.canvasContainer.ondragover = e => e.preventDefault();
      dom.canvasContainer.ondrop = e => {
        e.preventDefault(); const shape = e.dataTransfer.getData('gost-shape'); if(shape) addBlockAtCenter(shape);
      };
    }

    function handleZoomIn() { appState.zoom = Math.min(MAX_ZOOM, appState.zoom + 0.15); requestSceneUpdate(); }
    function handleZoomOut() { appState.zoom = Math.max(MIN_ZOOM, appState.zoom - 0.15); requestSceneUpdate(); }
    function zoomReset() { appState.zoom = 1; appState.panX = 0; appState.panY = 0; requestSceneUpdate(); }
    function toggleSidebar() { appState.sidebarOpen = !appState.sidebarOpen; dom.sidebar.classList.toggle('collapsed', !appState.sidebarOpen); }
    function setupKeyboardShortcuts() { window.onkeydown = e => { if(e.key==='Delete') deleteCurrentSelected(); }; }

    function compileToPseudocode() {
      const sheet = appState.sheets[appState.activeSheetId];
      const blocks = Object.values(sheet.blocks);
      const connections = Object.values(sheet.connections);
      
      if (blocks.length === 0) {
        showCustomModal('Псевдокод алгоритма', 'На листе нет ГОСТ-блоков для трансляции.', null);
        return;
      }

      // 1. Находим точку входа (Начало)
      let startBlock = blocks.find(b => b.type === 'oval' && (b.text.toLowerCase().includes('старт') || b.text.toLowerCase().includes('начало')));
      if (!startBlock) {
        startBlock = blocks.find(b => b.type === 'oval');
      }

      if (!startBlock) {
        showCustomModal('Ошибка трансляции', 'Не найден начальный блок (фигура Овал с текстом "Начало"/"Старт"). Добавьте этот элемент, чтобы задать точку входа.', null);
        return;
      }

      // 2. Инициализация переменных на листе
      let code = `// =========================================================\n`;
      code += `// АВТОМАТИЧЕСКИ СГЕНЕРИРОВАННЫЙ КЛИЕНТСКИЙ СЦЕНАРИЙ (ГОСТ)\n`;
      code += `// Лист: ${sheet.name}\n`;
      code += `// =========================================================\n\n`;

      code += `// Объявление переменных и их начальных значений:\n`;
      const sheetVars = sheet.variables || [];
      if (sheetVars.length > 0) {
        for (let i = 0; i < sheetVars.length; i++) {
          const v = sheetVars[i];
          let formattedValue = v.value;
          if (v.type === 'string') formattedValue = `"${v.value}"`;
          if (v.type === 'char') formattedValue = `'${v.value}'`;
          code += `${v.name} = ${formattedValue}; // Тип: ${v.type}\n`;
        }
      } else {
        code += `// Локальные переменные в проекте не созданы\n`;
      }
      code += `\n// Исполняемый процесс алгоритма:\n`;
      
      const visited = new Set();
      
      function getOutboundConnections(blockId) {
        return connections.filter(c => c.from === blockId && c.type !== 'comment');
      }

      function translateBlock(block, indent = 0) {
        if (!block) return '';
        const ind = '  '.repeat(indent);
        
        // Предотвращаем вечный цикл при проходе петель (например, циклов)
        if (visited.has(block.id)) {
          return `${ind}// [Переход к циклическому блоку: "${block.text}"]\n`;
        }
        visited.add(block.id);

        let blockText = '';
        const outConns = getOutboundConnections(block.id);

        if (block.type === 'oval') {
          if (block.text.toLowerCase().includes('старт') || block.text.toLowerCase().includes('начало')) {
            blockText += `${ind}Начало выполнения алгоритма\n`;
          } else {
            blockText += `${ind}Конец выполнения алгоритма\n`;
            return blockText; // Финализация прохода ветви
          }
        } 
        else if (block.type === 'rectangle') {
          if (block.rectOperation && block.rectOperation.targetVarId) {
            const targetVar = sheetVars.find(v => v.id === block.rectOperation.targetVarId);
            if (targetVar) {
              blockText += `${ind}${targetVar.name} ${block.rectOperation.operator} ${block.rectOperation.expression || '0'}; // Действие: ${block.text}\n`;
            } else {
              blockText += `${ind}${block.text}; \n`;
            }
          } else {
            blockText += `${ind}${block.text}; \n`;
          }
        } 
        else if (block.type === 'parallelogram') {
          if (block.associatedVars && block.associatedVars.length > 0) {
            const boundNames = block.associatedVars.map(vId => {
              const vObj = sheetVars.find(item => item.id === vId);
              return vObj ? vObj.name : '';
            }).filter(n => n !== '');
            const actionType = block.text.toLowerCase().includes('ввод') ? 'Ввод' : 'Вывод';
            blockText += `${ind}${actionType}(${boundNames.join(', ')}); // ${block.text}\n`;
          } else {
            blockText += `${ind}${block.text}; \n`;
          }
        } 
        else if (block.type === 'subroutine') {
          blockText += `${ind}Вызов подпрограммы: ${block.text};\n`;
        }
        else if (block.type === 'rhombus') {
          // Условие ветвления (Ромб)
          let condStr = block.text;
          if (block.rhomCondition && block.rhomCondition.left) {
            condStr = `${block.rhomCondition.left} ${block.rhomCondition.operator} ${block.rhomCondition.right}`;
          }

          blockText += `${ind}если (${condStr}) {\n`;

          // Маркировка исходящих связей «Да» и «Нет»
          const yesKeywords = ['да', 'yes', '+', '1', 'true', 'истина'];
          const noKeywords = ['нет', 'no', '-', '0', 'false', 'ложь'];

          const yesConn = outConns.find(c => yesKeywords.includes(c.label.toLowerCase().trim()));
          const noConn = outConns.find(c => noKeywords.includes(c.label.toLowerCase().trim()));

          let branchesProcessed = false;
          
          if (yesConn || noConn) {
            if (yesConn) {
              const targetYesBlock = sheet.blocks[yesConn.to];
              // Создаем копию визитов для изолированного прохода веток
              const branchVisited = new Set(visited);
              blockText += `${ind}  // Ветка ИСТИНА [Да]\n`;
              blockText += translateBlock(targetYesBlock, indent + 1);
            } else {
              blockText += `${ind}  // Ветка ИСТИНА [Пусто]\n`;
            }

            blockText += `${ind}} иначе {\n`;

            if (noConn) {
              const targetNoBlock = sheet.blocks[noConn.to];
              blockText += `${ind}  // Ветка ЛОЖЬ [Нет]\n`;
              blockText += translateBlock(targetNoBlock, indent + 1);
            } else {
              blockText += `${ind}  // Ветка ЛОЖЬ [Пусто]\n`;
            }
            blockText += `${ind}}\n`;
            branchesProcessed = true;
          }

          if (!branchesProcessed && outConns.length > 0) {
            // Если ветви никак не размечены
            blockText += `${ind}  // Предупреждение: Линии выхода не размечены метками "Да" / "Нет".\n`;
            blockText += `${ind}  // Выводим линейное продолжение первой найденной ветки:\n`;
            const target = sheet.blocks[outConns[0].to];
            blockText += translateBlock(target, indent + 1);
            blockText += `${ind}}\n`;
          }
          return blockText; // Ромб управляет своими потомками самостоятельно
        }

        // Стандартный линейный переход
        if (block.type !== 'rhombus' && outConns.length > 0) {
          const nextBlock = sheet.blocks[outConns[0].to];
          blockText += translateBlock(nextBlock, indent);
        }

        return blockText;
      }

      code += translateBlock(startBlock, 0);

      // Отображаем полученный псевдокод во встроенном модальном окне
      showCustomModal('📄 Сгенерированный код алгоритма', 'Полученный псевдокод с С-подобными комментариями "//" можно скопировать в буфер обмена:', function() {
        const textarea = dom.modalTextarea;
        textarea.select();
        try {
          const successful = document.execCommand('copy');
          if (successful) {
            showCustomModal('Успешно', 'Код алгоритма скопирован в буфер обмена!', null);
          }
        } catch (err) {
          showCustomModal('Инфо', 'Автокопирование заблокировано браузером. Пожалуйста, скопируйте текст из окна вручную (Ctrl+C).', null);
        }
      }, true, code, true);
    }
    function exportWholeBook() {
      const bookData = {
        version: "1.0",
        activeSheetId: appState.activeSheetId,
        sheets: appState.sheets
      };
      const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(bookData, null, 2));
      const downloadAnchor = document.createElement('a');
      downloadAnchor.setAttribute("href", dataStr);
      downloadAnchor.setAttribute("download", `gost_flowchart_book.json`);
      document.body.appendChild(downloadAnchor);
      downloadAnchor.click();
      downloadAnchor.remove();
    }
    function triggerImport() { dom.fileInput.click(); }
    function updateParallelogramBadge(block) {
      const bDOM = document.getElementById(block.id);
      if (!bDOM) return;
      const badge = bDOM.querySelector('.gost-block-type-badge');
      if (!badge) return;

      const sheet = appState.sheets[appState.activeSheetId];
      if (!block.associatedVars) block.associatedVars = [];

      const parts = [];
      const len = block.associatedVars.length;
      for (let i = 0; i < len; i++) {
        const vId = block.associatedVars[i];
        const vObj = sheet.variables.find(item => item.id === vId);
        if (vObj) {
          parts.push(`${vObj.name}:${vObj.type}`);
        }
      }

      badge.innerText = parts.join(', ');
    }
  </script>
