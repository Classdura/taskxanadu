<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OW Tactics Hub V5</title>
    <style>
        :root { 
            --bg: #121212; --card: #1e1e1e; --accent: #f99e1a; --text: #eee; 
            --tank: #00a1ff; --damage: #ef4444; --support: #fbbf24;
        }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; }
        .view { display: none; width: 100%; max-width: 800px; margin: auto; }
        .active { display: block; }

        /* Сетка и контейнеры */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 15px; margin-top: 15px; }
        .rel-item-container { display: flex; flex-direction: column; gap: 5px; }

        /* Иконки-ячейки */
        .hero-btn { 
            position: relative; aspect-ratio: 1/1;
            background: var(--card); border: 3px solid #333; 
            border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 10px; transition: 0.2s; cursor: pointer; text-align: center;
        }
        .hero-btn.tank { border-color: var(--tank); }
        .hero-btn.damage { border-color: var(--damage); }
        .hero-btn.support { border-color: var(--support); }
        
        /* Кнопки управления на иконках */
        .btn-icon { position: absolute; border: none; border-radius: 50%; width: 22px; height: 22px; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: bold; z-index: 10; border: 1px solid rgba(255,255,255,0.2); }
        .del-rel { top: -8px; right: -8px; background: #ff4444; }
        .note-toggle { bottom: -8px; right: -8px; background: var(--accent); color: black; }

        /* Поле заметки ПОД иконкой */
        .rel-external-note { 
            width: 100%; background: #2a2a2a; border-radius: 6px; border: 1px solid #444;
            display: none; padding: 5px; box-sizing: border-box;
        }
        .rel-external-note.show { display: block; }
        .rel-external-note textarea { 
            background: transparent; border: none; color: #ccc; font-size: 11px; 
            width: 100%; height: 50px; resize: none; outline: none; padding: 0; font-family: inherit;
        }

        /* Интерфейс */
        .filter-row { display: flex; gap: 5px; margin: 10px 0; overflow-x: auto; padding-bottom: 5px; }
        .f-btn { padding: 8px 12px; border: 1px solid #444; background: #222; color: white; border-radius: 20px; font-size: 11px; white-space: nowrap; cursor: pointer; }
        .f-btn.active { background: white; color: black; border-color: white; }

        .btn { padding: 10px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .btn-main { background: var(--accent); color: black; }
        .btn-sec { background: #444; color: white; }
        
        input, select { width: 100%; padding: 10px; background: #2a2a2a; color: white; border: 1px solid #444; border-radius: 6px; box-sizing: border-box; }
        .stat-item { background: #222; padding: 10px; border-radius: 8px; margin-bottom: 5px; display: flex; align-items: center; gap: 10px; }
    </style>
</head>
<body>

    <div id="main-menu" class="view active">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h2 style="margin:0">Overwatch DB</h2>
            <button class="btn btn-sec" onclick="openStats()">📊 Менеджер</button>
        </div>

        <div class="filter-row">
            <button class="f-btn active" onclick="setMainFilter('all', this)">Все</button>
            <button class="f-btn" onclick="setMainFilter('tank', this)">Танки</button>
            <button class="f-btn" onclick="setMainFilter('damage', this)">Урон</button>
            <button class="f-btn" onclick="setMainFilter('support', this)">Саппорты</button>
        </div>

        <div style="display: flex; gap: 5px;">
            <button id="mode-c" class="btn btn-main" style="flex:1" onclick="setMode('counters')">КОНТРПИКИ</button>
            <button id="mode-s" class="btn btn-main" style="flex:1; opacity:0.5" onclick="setMode('synergy')">СИНЕРГИЯ</button>
        </div>
		<div id="sort-controls" style="display:flex; gap:5px; flex-wrap:wrap; margin-top:15px; justify-content:center;"></div>
        <div class="grid" id="hero-grid"></div>

        <div style="margin-top: 25px; background: var(--card); padding: 15px; border-radius: 12px; border: 1px dashed #444;">
            <input type="text" id="new-name" placeholder="Имя героя...">
            <div style="display: flex; gap: 5px; margin-top: 8px;">
                <select id="new-role" style="flex:2">
                    <option value="tank">Танк</option>
                    <option value="damage" selected>Урон</option>
                    <option value="support">Саппорт</option>
                </select>
                <button class="btn btn-main" style="flex:1" onclick="addHero()">+</button>
            </div>
        </div>
    </div>

    <div id="detail-view" class="view">
        <button class="btn btn-sec" onclick="showMain()">← НАЗАД</button>
        <div style="display: flex; align-items: center; gap: 15px; margin: 20px 0 5px 0;">
            <div id="det-img" style="width: 60px; height: 60px; border-radius: 8px; background-size: cover; background-position: center; display: none; border: 2px solid #444;"></div>
            <h1 id="det-title" style="margin: 0">Имя</h1>
        </div>
        
        <div style="background: #222; padding: 12px; border-radius: 8px; margin-bottom: 20px; display: flex; gap: 20px;">
            <span>Lvl: <b id="det-lvl-val">0</b></span>
            <span>Hrs: <b id="det-hrs-val">0</b></span>
        </div>

        <div style="background: var(--card); padding: 15px; border-radius: 12px;">
            <label id="rel-label" style="font-weight:bold">Связи:</label>
            <div class="filter-row">
                <button class="f-btn active" onclick="setSelFilter('all', this)">Все</button>
                <button class="f-btn" onclick="setSelFilter('tank', this)">Танки</button>
                <button class="f-btn" onclick="setSelFilter('damage', this)">Урон</button>
                <button class="f-btn" onclick="setSelFilter('support', this)">Саппорты</button>
            </div>
            <select id="rel-selector" onchange="addRel(this.value)"></select>
            
            <div id="rel-grid" class="grid"></div>
        </div>
    </div>

    <div id="stats-view" class="view">
        <button class="btn btn-sec" onclick="showMain()">← НАЗАД</button>
        <div style="display: flex; gap: 8px; margin: 15px 0;">
            <button class="btn btn-main" style="flex:1" onclick="exportJSON()">💾 ЭКСПОРТ</button>
            <button class="btn btn-main" style="flex:1" onclick="document.getElementById('imp').click()">📂 ИМПОРТ</button>
            <input type="file" id="imp" style="display:none" onchange="importJSON(this)">
        </div>
        <div id="stats-list"></div>
    </div>

    <script>
	let currentSort = 'name'; // Критерий: 'name', 'hours' или 'lvl'

        function setSort(type) {
            currentSort = type;
            renderGrid();
        }
        let db = JSON.parse(localStorage.getItem('ow_ultra_v5')) || {};
        let currentMode = 'counters';
        let mainFilter = 'all';
        let selFilter = 'all';
        let activeHero = null;

        function save() { localStorage.setItem('ow_ultra_v5', JSON.stringify(db)); }

        // Добавление героя
        function addHero() {
            const name = document.getElementById('new-name').value.trim();
            const role = document.getElementById('new-role').value;
            if (name && !db[name]) {
                db[name] = { role, hours: 0, lvl: 0, counters: [], synergy: [] };
                save();
                document.getElementById('new-name').value = "";
                renderGrid();
            }
        }

        // Рендер главного меню
        function renderGrid() {
    const grid = document.getElementById('hero-grid');
    const sortContainer = document.getElementById('sort-controls');
    if (!grid || !sortContainer) return;

    // Отрисовываем кнопки отдельно от сетки
    sortContainer.innerHTML = `
        <button class="f-btn ${currentSort === 'name' ? 'active' : ''}" onclick="setSort('name')">А-Я</button>
        <button class="f-btn ${currentSort === 'hours' ? 'active' : ''}" onclick="setSort('hours')">По часам</button>
        <button class="f-btn ${currentSort === 'lvl' ? 'active' : ''}" onclick="setSort('lvl')">По уровню</button>
    `;

    grid.innerHTML = ''; // Чистим только сетку

    let sorted = Object.keys(db);
    
    // Сортировка
    if (currentSort === 'name') {
        sorted.sort();
    } else {
        sorted.sort((a, b) => (db[b][currentSort] || 0) - (db[a][currentSort] || 0));
    }

    sorted.forEach(name => {
        const h = db[name];
        if (mainFilter !== 'all' && h.role !== mainFilter) return;
        
        const div = document.createElement('div');
        div.className = `hero-btn ${h.role}`;
        div.style.overflow = 'hidden';
        const imgHtml = h.img ? `<img src="${h.img}" style="position:absolute; top:0; left:0; width:100%; height:100%; object-fit:cover; opacity:0.4; z-index:1;">` : '';
        div.innerHTML = `
            ${imgHtml}
            <b style="position:relative; z-index:2; text-shadow:1px 1px 2px #000;">${name}</b>
            <span style="font-size:10px; opacity:0.7; margin-top:5px; position:relative; z-index:2; text-shadow:1px 1px 2px #000;">Lvl: ${h.lvl}</span>
        `;
        div.onclick = () => openHero(name);
        grid.appendChild(div);
    });
}

        // Открытие карточки
        function openHero(name) {
    activeHero = name;
    selFilter = 'all';
    const h = db[name];
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById('detail-view').classList.add('active');
    
    document.getElementById('det-title').innerText = name;
    document.getElementById('det-title').style.color = `var(--${h.role})`;
    
    const detImg = document.getElementById('det-img');
    if (h.img) {
        detImg.style.backgroundImage = `url(${h.img})`;
        detImg.style.display = 'block';
    } else {
        detImg.style.display = 'none';
    }
    
    document.getElementById('det-lvl-val').innerText = h.lvl || 0;
    document.getElementById('det-hrs-val').innerText = h.hours || 0;
    
    // Устанавливаем правильный текст заголовка при открытии
    const label = document.getElementById('rel-label');
    label.innerText = currentMode === 'counters' ? 'Кем контрить:' : 'С кем лучше взаимодействия:';

    document.querySelectorAll('#detail-view .f-btn').forEach(b => {
        b.classList.toggle('active', b.innerText === 'Все');
    });

    updateSelector();
    renderRels();
}

        // Рендер связей (контрпики/синергия)
        function renderRels() {
    const grid = document.getElementById('rel-grid');
    if (!grid) return;
    grid.innerHTML = '';
    
    // Создаем копию массива связей для сортировки, чтобы не менять порядок в базе навсегда
    const rels = [...db[activeHero][currentMode]];

    // СОРТИРОВКА: вычисляем вес каждого контрпика/синергии
    rels.sort((a, b) => {
        const hA = db[a.name] || {lvl: 0, hours: 0};
        const hB = db[b.name] || {lvl: 0, hours: 0};
        return (hB.lvl + hB.hours) - (hA.lvl + hA.hours);
    });

    rels.forEach((item) => {
        const targetName = item.name;
        const targetHero = db[targetName];
        if(!targetHero) return;

        // Фильтр по ролям
        if (selFilter !== 'all' && targetHero.role !== selFilter) return;

        // Находим оригинальный индекс для удаления (так как массив отсортирован)
        const originalIndex = db[activeHero][currentMode].indexOf(item);
        const note = item.note || "";
        const container = document.createElement('div');
        container.className = 'rel-item-container';

        const imgHtml = targetHero.img ? `<img src="${targetHero.img}" style="position:absolute; top:0; left:0; width:100%; height:100%; object-fit:cover; opacity:0.4; z-index:1;">` : '';
        container.innerHTML = `
            <div class="hero-btn ${targetHero.role}" onclick="openHero('${targetName}')" style="overflow:hidden;">
                ${imgHtml}
                <b style="position:relative; z-index:2; text-shadow:1px 1px 2px #000;">${targetName}</b>
                <div style="font-size:9px; opacity:0.8; margin-top:4px; position:relative; z-index:2; text-shadow:1px 1px 2px #000;">${targetHero.lvl} L / ${targetHero.hours} H</div>
                <button class="btn-icon del-rel" onclick="event.stopPropagation(); removeRel(${originalIndex})">✕</button>
                <button class="btn-icon note-toggle" onclick="event.stopPropagation(); toggleNoteEdit(${originalIndex})">📝</button>
            </div>
            <div id="note-box-${originalIndex}" class="rel-external-note ${note ? 'show' : ''}" onclick="event.stopPropagation()">
                <textarea oninput="saveRelNote(${originalIndex}, this.value)" placeholder="Заметка...">${note}</textarea>
            </div>
        `;
        grid.appendChild(container);
    });
}

        function toggleNoteEdit(idx) {
            const box = document.getElementById(`note-box-${idx}`);
            if (box) box.classList.toggle('show');
        }

        function saveRelNote(idx, text) {
            db[activeHero][currentMode][idx].note = text;
            save();
        }

        function removeRel(idx) {
            db[activeHero][currentMode].splice(idx, 1);
            save();
            renderRels();
        }

        function updateSelector() {
    const sel = document.getElementById('rel-selector');
    if (!sel) return;
    sel.innerHTML = '<option value="">+ Добавить персонажа...</option>';
    
    // Просто алфавитный список для удобства поиска
    const names = Object.keys(db).filter(n => 
        n !== activeHero && (selFilter === 'all' || db[n].role === selFilter)
    ).sort();

    names.forEach(n => {
        sel.innerHTML += `<option value="${n}">${n}</option>`;
    });
}

        function addRel(target) {
            if(!target) return;
            const exists = db[activeHero][currentMode].find(i => (typeof i === 'string' ? i : i.name) === target);
            if(!exists) {
                db[activeHero][currentMode].push({ name: target, note: "" });
                save();
                renderRels();
            }
            document.getElementById('rel-selector').value = "";
        }

        // Фильтры
        function setMainFilter(f, btn) {
            mainFilter = f;
            document.querySelectorAll('#main-menu .f-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderGrid();
        }

        function setSelFilter(f, btn) {
            selFilter = f;
            document.querySelectorAll('#detail-view .f-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            updateSelector();
            renderRels();
        }

        function setMode(m) {
    currentMode = m;
    
    // Подсвечиваем активную кнопку режима
    document.getElementById('mode-c').style.opacity = m === 'counters' ? '1' : '0.4';
    document.getElementById('mode-s').style.opacity = m === 'synergy' ? '1' : '0.4';
    
    // МЕНЯЕМ ТЕКСТ ЗАГОЛОВКА
    const label = document.getElementById('rel-label');
    if (label) {
        label.innerText = m === 'counters' ? 'Кем контрить:' : 'С кем лучше взаимодействия:';
    }
    
    if(activeHero) renderRels();
}

        // Менеджер статы
        function openStats() {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById('stats-view').classList.add('active');
    const list = document.getElementById('stats-list');
    list.innerHTML = '';
    
    const totalCount = Object.keys(db).length;
    
    // Шапка с общим счетчиком и названиями колонок
    list.innerHTML = `
        <div style="background: #333; padding: 10px; border-radius: 8px; margin-bottom: 15px;">
            <div style="text-align: center; margin-bottom: 10px;">Всего героев: <b>${totalCount}</b></div>
            <div style="display:flex; gap:5px; flex-wrap:wrap; justify-content:center;">
                <button class="f-btn" onclick="copyList('all')">📋 Все</button>
                <button class="f-btn" onclick="copyList('tank')">📋 Танки</button>
                <button class="f-btn" onclick="copyList('damage')">📋 Урон</button>
                <button class="f-btn" onclick="copyList('support')">📋 Сап</button>
            </div>
        </div>
        `;

    Object.keys(db).sort().forEach(name => {
        const h = db[name];
        const imgBg = h.img ? `background-image:url(${h.img}); background-size:cover; background-position:center;` : 'background:#333;';
        list.innerHTML += `
            <div class="stat-item" style="flex-wrap: wrap; gap: 10px 8px;">
                <div id="stat-thumb-${name}" style="width:35px; height:35px; border-radius:6px; border:1px solid #444; ${imgBg}"></div>
                <span id="name-display-${name}" style="flex:1; min-width:80px; font-weight:bold; color:var(--${h.role}); cursor:pointer;" onclick="editName('${name}')">${name}</span>
                
                <div style="display:flex; gap:4px; align-items:center;">
                    <input type="text" placeholder="URL фото" value="${h.img && !h.img.startsWith('data:') ? h.img : ''}" style="width:100px; padding:6px; font-size:11px;" onchange="updateHeroImg('${name}', this.value)">
                    <label class="btn btn-sec" style="padding:6px 10px; font-size:11px; margin:0; cursor:pointer;" title="Загрузить файл">
                        📁
                        <input type="file" accept="image/*" style="display:none" onchange="uploadHeroImg('${name}', this)">
                    </label>
                </div>

                <div style="display:flex; gap:5px;">
                    <input type="number" value="${h.hours}" style="width:55px; text-align:center" onchange="quickUpd('${name}','hours',this.value)">
                    <input type="number" value="${h.lvl}" style="width:55px; text-align:center" onchange="quickUpd('${name}','lvl',this.value)">
                </div>
                <button onclick="deleteHero('${name}')" style="background:none; border:none; color:red; cursor:pointer; width:25px">🗑️</button>
            </div>`;
    });
}
function copyList(roleFilter) {
    const names = Object.keys(db)
        .filter(n => roleFilter === 'all' || db[n].role === roleFilter)
        .sort();
    
    const text = names.join('\n');
    navigator.clipboard.writeText(text).then(() => {
        alert('Список скопирован: ' + names.length + ' имен');
    });
}
        function quickUpd(name, field, val) { db[name][field] = parseInt(val) || 0; save(); }

        function updateHeroImg(name, url) {
            db[name].img = url.trim();
            save();
            const thumb = document.getElementById(`stat-thumb-${name}`);
            if (thumb) {
                thumb.style.backgroundImage = db[name].img ? `url(${db[name].img})` : 'none';
                thumb.style.background = db[name].img ? '' : '#333';
            }
        }

        function uploadHeroImg(name, input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const base64 = e.target.result;
                    db[name].img = base64;
                    save();
                    const thumb = document.getElementById(`stat-thumb-${name}`);
                    if (thumb) {
                        thumb.style.backgroundImage = `url(${base64})`;
                        thumb.style.background = '';
                    }
                };
                reader.readAsDataURL(input.files[0]);
            }
        }
        function deleteHero(n) { if(confirm('Удалить героя?')) { delete db[n]; save(); openStats(); } }
        function showMain() { document.querySelectorAll('.view').forEach(v => v.classList.remove('active')); document.getElementById('main-menu').classList.add('active'); renderGrid(); }

        // Импорт/Экспорт
        function exportJSON() {
            const data = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(db));
            const dl = document.createElement('a');
            dl.setAttribute("href", data);
            dl.setAttribute("download", "ow_db.json");
            dl.click();
        }

        function importJSON(i) {
            const r = new FileReader();
            r.onload = function() { 
                try {
                    db = JSON.parse(r.result); 
                    save(); 
                    location.reload();
                } catch(e) { alert("Ошибка файла!"); }
            };
            r.readAsText(i.files[0]);
        }

        // Старт
        renderGrid();
		function editName(oldName) {
    const el = document.getElementById(`name-display-${oldName}`);
    const input = document.createElement('input');
    input.value = oldName;
    input.style.width = '80px';
    input.onblur = () => {
        const newName = input.value.trim();
        if (newName && newName !== oldName) {
            db[newName] = db[oldName];
            delete db[oldName];
            save();
            openStats(); // Перерендерим список
        } else {
            el.innerText = oldName;
        }
    };
    el.innerText = '';
    el.appendChild(input);
    input.focus();
}
    </script>
</body>
</html>
