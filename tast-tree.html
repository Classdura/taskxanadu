<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>✅</text></svg>">
    <title>Advanced Multi-Branch To-Do</title>
    <style>
        :root {
            --bg-color: #f8fafc;
            --text-color: #0f172a;
            --container-bg: #ffffff;
            --border-color: #8a9098;
            --accent-color: #0284c7;
            --btn-bg: #ffffff;
            --btn-hover: #f1f5f9;
            --danger-color: #ef4444;
            --glass-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        body.dark-theme {
            --bg-color: #0f172a;
            --text-color: #f8fafc;
            --container-bg: #1e293b;
            --border-color: #5f6f86;
            --accent-color: #38bdf8;
            --btn-bg: #1e293b;
            --btn-hover: #334155;
            --glass-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color); /* Исправлено: заменено с background на background-color для плавной работы JS */
            color: var(--text-color);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
            transition: background-color 0.3s, color 0.3s;
            font-size: 16px;
        }

        /* Layout */
        #sidebar {
            width: 250px;
            background: var(--container-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease;
            box-shadow: var(--glass-shadow);
            will-change: transform;
        }
        #sidebar.hidden {
            display: none;
        }
        #main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            position: relative;
        }
        /* Toolbar */
        .toolbar {
            display: flex;
            gap: 10px;
            padding: 12px;
            background: var(--container-bg);
            border-bottom: 1px solid var(--border-color);
            flex-wrap: wrap;
            align-items: center;
        }
        .toolbar button, .toolbar label {
            background: var(--btn-bg);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 6px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s ease;
        }
        .toolbar button:hover, .toolbar label:hover {
            background: var(--btn-hover);
        }
        .toolbar input[type="color"] {
            border: none;
            width: 30px;
            height: 30px;
            padding: 0;
            cursor: pointer;
            background: none;
        }

        /* Map List */
        .map-list {
            list-style: none;
            padding: 0;
            margin: 0;
            overflow-y: auto;
            flex: 1;
        }
        .map-item {
            padding: 10px;
            cursor: pointer;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .map-item:hover { background-color: var(--btn-hover); }
        .map-item.active { border-left: 4px solid var(--accent-color); font-weight: bold; }
        .btn-edit { 
            margin-left: auto; 
            margin-right: 5px; 
            background: transparent; 
            border: none; 
            color: var(--text-color); 
            cursor: pointer; 
            opacity: 0.6;
        }
        .btn-edit:hover { opacity: 1; }
        
        /* Tree Area */
        .board { padding: 20px; }
        .global-stats {
            margin-bottom: 15px;
            font-size: 1.2em;
            font-weight: bold;
            color: var(--accent-color);
        }

        ul { list-style-type: none; padding-left: 20px; }
        .tree-root > ul { padding-left: 0; }
        
        .task-item {
            margin: 5px 0;
            display: flex;
            flex-direction: column;
        }
        .task-content {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: var(--container-bg);
            background-color: var(--node-custom-color, var(--container-bg));
            border: 1px solid var(--border-color);
            border-radius: 8px;
            box-shadow: var(--glass-shadow);
            transition: border-color 0.2s ease;
        }
        .task-content:hover {
            border-color: var(--accent-color);
        }
        .task-content.completed > .task-text { text-decoration: line-through; opacity: 0.5; }
        .task-content.focused {
            border: 2px solid var(--accent-color);
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.3);
            background-color: color(display-p3 0.32 0.74 1 / 0.42);
        }

        .node-color-picker {
            border: 1px solid var(--border-color);
            width: 22px;
            height: 22px;
            padding: 0;
            background: none;
            cursor: pointer;
            border-radius: 4px;
            overflow: hidden;
            transition: transform 0.2s;
            margin-left: 4px;
        }
        .node-color-picker:hover {
            transform: scale(1.1);
        }
        .task-text {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-color); 
            font-size: 16px;
            font-weight: 500;
        }
        .task-text:focus { 
            outline: none; 
            background: var(--btn-hover); 
            border-radius: 4px;
        }
        .task-stats { 
            font-size: 0.85em; 
            color: var(--text-color); 
            opacity: 0.65;
            margin-right: 10px;
            background: var(--btn-hover);
            padding: 2px 6px;
            border-radius: 4px;
        }
        .task-controls button {
            background: var(--btn-bg); 
            border: 1px solid var(--border-color);
            color: var(--text-color); 
            cursor: pointer; 
            border-radius: 4px;
            padding: 4px 8px;
            font-size: 14px; 
            margin-left: 4px;
        }
        .task-controls button:hover { background: var(--btn-hover); }
        .btn-delete { color: var(--danger-color) !important; }
        
        /* Плоская современная кнопка */
        .btn-main-add {
            display: block;
            width: 100%;
            max-width: 300px;
            margin: 20px auto;
            padding: 12px 24px;
            background: var(--accent-color);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: var(--glass-shadow);
        }

        .btn-main-add:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .btn-main-add:active {
            transform: translateY(1px);
        }

        .sidebar-toggle-btn {
            margin: 10px;
            padding: 8px;
            background: var(--btn-bg);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            border-radius: 4px;
            cursor: pointer;
        }
        .hidden-file { display: none; }
        .brand-header { padding: 15px; border-bottom: 1px solid var(--border-color); font-weight: bold; }
        .btn-toggle {
            background: transparent;
            border: none;
            color: var(--text-color);
            cursor: pointer;
            font-size: 10px;
            width: 20px;
            padding: 0;
            opacity: 0.7;
        }
        
        /* Современный аккуратный чекбокс */
        .task-content input[type="checkbox"] {
            appearance: none;
            -webkit-appearance: none;
            width: 25px;
            height: 25px;
            border: 2px solid var(--border-color);
            border-radius: 4px;
            cursor: pointer;
            position: relative;
            background: var(--btn-bg);
            transition: all 0.2s ease;
            flex-shrink: 0;
            margin: 0;
        }

        .task-content input[type="checkbox"]:hover {
            border-color: var(--accent-color);
        }

        .task-content input[type="checkbox"]:checked {
            background: var(--accent-color);
            border-color: var(--accent-color);
        }

        .task-content input[type="checkbox"]:checked::after {
            content: '✓';
            position: absolute;
            color: white;
            font-size: 12px;
            font-weight: bold;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        .collapsed-content { display: none; }

        @media (max-width: 768px) {
            #sidebar {
                position: fixed;
                z-index: 2000;
                height: 100%;
                transform: translateX(0);
            }
            #sidebar.hidden {
                display: flex !important;
                transform: translateX(-100%);
            }
            .toolbar {
                padding: 15px;
                gap: 8px;
                justify-content: center;
            }
            .toolbar button, .toolbar label {
                flex: 1 1 45%;
                text-align: center;
                padding: 12px 5px;
            }
            .task-content {
                flex-wrap: wrap;
            }
            .task-controls {
                width: 100%;
                display: flex;
                justify-content: space-around;
                margin-top: 10px;
                padding-top: 10px;
                border-top: 1px dashed var(--border-color);
            }
            .board { padding: 10px; }
            #map-title { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <!-- Sidebar: Карты -->
    <div id="sidebar">
        <div class="brand-header">Книги / Карты</div>
		<button class="sidebar-toggle-btn" onclick="app.toggleSidebar()">✕ Закрыть меню</button>        <ul class="map-list" id="map-list"></ul>
        <div class="toolbar" style="border-top: 1px solid var(--border-color); border-bottom: none;">
            <button onclick="app.addMap()">+ Новая карта</button>
        </div>
    </div>

    <!-- Main Content -->
    <div id="main-content">
        <!-- Глобальный тулбар -->
        <div class="toolbar">
            <button onclick="app.toggleSidebar()">Меню (Карты)</button>
            <button onclick="app.toggleTheme()">Сменить Тему</button>
            <label>Фон: <input type="color" id="bg-color" onchange="app.changeBackground(this.value)"></label>
            <button onclick="app.undo()">Undo (Отменить)</button>
            <button onclick="app.redo()">Redo (Повторить)</button>
            
            <button onclick="app.exportBook()">Экспорт Книги</button>
            <label>Импорт Книги <input type="file" class="hidden-file" accept=".json" onchange="app.importBook(event)"></label>
            
            <button onclick="app.exportMap()">Экспорт Карты</button>
            <label>Импорт Карты <input type="file" class="hidden-file" accept=".json" onchange="app.importMap(event)"></label>
        </div>

        <!-- Рабочая зона -->
        <div class="board">
            <h1 id="map-title" contenteditable="true" onblur="app.updateMapTitle(this.innerText)">Название Карты</h1>
            <div class="global-stats" id="global-stats">Общий статус: 0/0 (0%)</div>
            <div class="tree-root" id="tree-root"></div>
			<div style="display:flex; gap: 10px; justify-content: center;">
                <button class="btn-main-add" onclick="app.addTask(null)">+ Добавить главную ветвь</button>
                <button class="btn-main-add" onclick="app.addBulkTasks(null)">+📋 Массово</button>
            </div>
        </div>
    </div>

    <!-- Стильный кастомный оверлей для модальных диалогов -->
    <div id="custom-modal-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 9999; align-items: center; justify-content: center;">
        <div style="background: var(--container-bg); color: var(--text-color); padding: 24px; border-radius: 12px; max-width: 400px; width: 90%; box-shadow: var(--glass-shadow); border: 1px solid var(--border-color); text-align: center;">
            <p id="custom-modal-text" style="font-size: 16px; margin: 0 0 20px 0; font-weight: 500; line-height: 1.5;"></p>
            <div style="display: flex; gap: 12px; justify-content: center;" id="custom-modal-buttons"></div>
        </div>
    </div>

    <script>
        // --- Audio System ---
        const AudioSys = {
            play(type) {
                try {
                    const ctx = new (window.AudioContext || window.webkitAudioContext)();
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    
                    if (type === 'check') {
                        osc.type = 'sine'; osc.frequency.setValueAtTime(600, ctx.currentTime);
                        osc.frequency.exponentialRampToValueAtTime(800, ctx.currentTime + 0.1);
                    } else if (type === 'uncheck') {
                        osc.type = 'sine'; osc.frequency.setValueAtTime(400, ctx.currentTime);
                        osc.frequency.exponentialRampToValueAtTime(200, ctx.currentTime + 0.1);
                    } else if (type === 'action') {
                        osc.type = 'square'; osc.frequency.setValueAtTime(300, ctx.currentTime);
                    }

                    gain.gain.setValueAtTime(0.1, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
                    osc.start(); osc.stop(ctx.currentTime + 0.1);
                } catch(e) { console.log('Audio disabled/error'); }
            }
        };

        // --- Core Application ---
        const app = {
            state: {
                theme: 'light',
                maps: [],
                currentMapId: null,
                focusedTaskIds: [] 
            },
            history: [],
            historyIndex: -1,
            isRestoring: false,

            init() {
                this.loadState();
                if (this.state.maps.length === 0) {
                    this.addMap("Моя первая карта", false);
                    this.saveState(true);
                } else {
                    this.history.push(JSON.stringify(this.state));
                    this.historyIndex = 0;
                }
                this.applySettings();
                this.render();
            },

            generateId() { return '_' + Math.random().toString(36).substr(2, 9); },

            // --- Кастомная система диалогов (вместо alert и confirm) ---
            showAlert(message) {
                const overlay = document.getElementById('custom-modal-overlay');
                const text = document.getElementById('custom-modal-text');
                const buttons = document.getElementById('custom-modal-buttons');
                
                text.innerText = message;
                buttons.innerHTML = `<button onclick="document.getElementById('custom-modal-overlay').style.display='none'" style="padding: 8px 24px; background: var(--accent-color); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: 600;">OK</button>`;
                overlay.style.display = 'flex';
            },

            showConfirm(message, onConfirm) {
                const overlay = document.getElementById('custom-modal-overlay');
                const text = document.getElementById('custom-modal-text');
                const buttons = document.getElementById('custom-modal-buttons');
                
                text.innerText = message;
                buttons.innerHTML = `
                    <button id="modal-cancel-btn" style="padding: 8px 20px; background: var(--btn-bg); color: var(--text-color); border: 1px solid var(--border-color); border-radius: 6px; cursor: pointer;">Отмена</button>
                    <button id="modal-confirm-btn" style="padding: 8px 20px; background: var(--danger-color); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: 600;">Удалить</button>
                `;
                
                document.getElementById('modal-cancel-btn').onclick = () => {
                    overlay.style.display = 'none';
                };
                
                document.getElementById('modal-confirm-btn').onclick = () => {
                    overlay.style.display = 'none';
                    onConfirm();
                };
                overlay.style.display = 'flex';
            },

            // --- State Management (Undo/Redo, Autosave) ---
            saveState(recordHistory = true) {
                if (!this.isRestoring && recordHistory) {
                    this.history = this.history.slice(0, this.historyIndex + 1);
                    this.history.push(JSON.stringify(this.state));
                    if (this.history.length > 50) this.history.shift();
                    else this.historyIndex++;
                }
                localStorage.setItem('todoData', JSON.stringify(this.state));
            },
            loadState() {
                const saved = localStorage.getItem('todoData');
                if (saved) {
                    try { this.state = JSON.parse(saved); } catch(e) { console.error('Data corrupted'); }
                }
            },
            undo() {
                if (this.historyIndex > 0) {
                    this.historyIndex--;
                    this.state = JSON.parse(this.history[this.historyIndex]);
                    this.isRestoring = true; this.saveState(false); this.isRestoring = false;
                    this.applySettings(); this.render(); AudioSys.play('action');
                }
            },
            redo() {
                if (this.historyIndex < this.history.length - 1) {
                    this.historyIndex++;
                    this.state = JSON.parse(this.history[this.historyIndex]);
                    this.isRestoring = true; this.saveState(false); this.isRestoring = false;
                    this.applySettings(); this.render(); AudioSys.play('action');
                }
            },

            // --- UI Actions ---
            toggleSidebar() {
                document.getElementById('sidebar').classList.toggle('hidden');
            },
            toggleTheme() {
                const oldTheme = this.state.theme;
                this.state.theme = oldTheme === 'light' ? 'dark' : 'light';
                
                const map = this.state.maps.find(m => m.id === this.state.currentMapId);
                const oldDefColor = oldTheme === 'dark' ? '#0f172a' : '#f8fafc';
                const newDefColor = this.state.theme === 'dark' ? '#0f172a' : '#f8fafc';
                
                if (map && map.bgColor === oldDefColor) {
                    map.bgColor = newDefColor;
                }
                
                this.applySettings(); this.saveState(); AudioSys.play('action');
            },
            changeBackground(color) {
                const map = this.state.maps.find(m => m.id === this.state.currentMapId);
                if (map) {
                    map.bgColor = color;
                    this.applySettings(); 
                    this.saveState();
                }
            },
            applySettings() {
                document.body.className = this.state.theme === 'dark' ? 'dark-theme' : '';
                const map = this.state.maps.find(m => m.id === this.state.currentMapId);
                const colorInput = document.getElementById('bg-color');
                
                if (map && map.bgColor) {
                    // Исправлено: переопределяем CSS-переменную на теге body напрямую
                    document.body.style.setProperty('--bg-color', map.bgColor);
                    if (colorInput) colorInput.value = map.bgColor;
                } else {
                    document.body.style.removeProperty('--bg-color');
                    if (colorInput) {
                        colorInput.value = this.state.theme === 'dark' ? '#0f172a' : '#f8fafc';
                    }
                }
            },

            // --- Maps (Книги/Карты) ---
            addMap(name = "Новая Карта", record = true) {
                const defColor = this.state.theme === 'dark' ? '#0f172a' : '#f8fafc';
                const newMap = { id: this.generateId(), name: name, tasks: [], bgColor: defColor };
                this.state.maps.push(newMap);
                this.state.currentMapId = newMap.id;
                this.applySettings(); // Мгновенно применяем цвет новой карты
                if(record) { this.saveState(); this.render(); AudioSys.play('action'); }
            },
            switchMap(id) {
                this.state.currentMapId = id;
                this.applySettings();
                this.saveState(); this.render();
				if (window.innerWidth <= 768) this.toggleSidebar();
            },
            deleteMap(id, e) {
                e.stopPropagation();
                this.showConfirm('Вы действительно хотите удалить эту карту со всеми ветвями?', () => {
                    this.state.maps = this.state.maps.filter(m => m.id !== id);
                    if(this.state.currentMapId === id) this.state.currentMapId = this.state.maps.length ? this.state.maps[0].id : null;
                    if(this.state.maps.length === 0) this.addMap("Новая карта", false);
                    this.saveState(); this.render(); AudioSys.play('action');
                });
            },
			focusTask(id) {
                // Инициализируем массив, если загрузили старое сохранение
                if (!this.state.focusedTaskIds) this.state.focusedTaskIds = [];
                
                const index = this.state.focusedTaskIds.indexOf(id);
                if (index > -1) {
                    // Если задача уже в фокусе — убираем её из очереди
                    this.state.focusedTaskIds.splice(index, 1);
                } else {
                    // Иначе добавляем в очередь
                    this.state.focusedTaskIds.push(id);
                }
                
                this.saveState();
                this.render();
            },
            updateMapTitle(newTitle) {
                const map = this.state.maps.find(m => m.id === this.state.currentMapId);
                if (map && map.name !== newTitle) { map.name = newTitle; this.saveState(); this.renderMapList(); }
            },
			renameMap(id, e) {
                e.stopPropagation();
                const map = this.state.maps.find(m => m.id === id);
                const newName = prompt("Введите новое название карты:", map.name);
                if (newName && newName.trim() !== "") {
                    map.name = newName.trim();
                    this.saveState();
                    this.render();
                    AudioSys.play('action');
                }
            },
            // --- Task Logic ---
            addTask(parentId = null) {
                const newTask = { id: this.generateId(), text: "Новая ветвь", completed: false, children: [] };
                const map = this.state.maps.find(m => m.id === this.state.currentMapId);
                if (!parentId) map.tasks.push(newTask);
                else {
                    const parent = this.findTask(map.tasks, parentId).node;
                    parent.children.push(newTask);
                }
                this.saveState(); this.render(); AudioSys.play('action');
            },
            updateTaskText(id, newText) {
                const map = this.state.maps.find(m => m.id === this.state.currentMapId);
                const taskInfo = this.findTask(map.tasks, id);
                if (taskInfo && taskInfo.node.text !== newText) {
                    taskInfo.node.text = newText;
                    this.saveState();
                }
            },
			addBulkTasks(parentId = null) {
                const input = prompt("Введите список задач (каждая с новой строки):");
                if (input === null) return;

                const lines = input.split('\n').filter(line => line.trim() !== "");
                if (lines.length === 0) return;

                const map = this.state.maps.find(m => m.id === this.state.currentMapId);
                
                lines.forEach(text => {
                    const newTask = { id: this.generateId(), text: text.trim(), completed: false, children: [] };
                    if (!parentId || parentId === 'null') {
                        map.tasks.push(newTask);
                    } else {
                        const parent = this.findTask(map.tasks, parentId).node;
                        parent.children.push(newTask);
                    }
                });

                this.saveState(); 
                this.render(); 
                AudioSys.play('action');
            },
            updateTaskColor(id, color) {
                const map = this.state.maps.find(m => m.id === this.state.currentMapId);
                const taskInfo = this.findTask(map.tasks, id);
                if (taskInfo) {
                    taskInfo.node.color = color;
                    this.saveState(); this.render();
                }
            },
            deleteTask(id) {
                const map = this.state.maps.find(m => m.id === this.state.currentMapId);
                const info = this.findTask(map.tasks, id);
                info.parentArray.splice(info.index, 1);
                this.saveState(); this.render(); AudioSys.play('action');
            },
            duplicateTask(id) {
                const map = this.state.maps.find(m => m.id === this.state.currentMapId);
                const info = this.findTask(map.tasks, id);
                const clone = JSON.parse(JSON.stringify(info.node));
                const regenIds = (task) => { task.id = this.generateId(); task.children.forEach(regenIds); };
                regenIds(clone);
                info.parentArray.splice(info.index + 1, 0, clone);
                this.saveState(); this.render(); AudioSys.play('action');
            },
            flattenTasks(tasks) {
                let flat = [];
                tasks.forEach(t => {
                    flat.push(t);
                    if (t.children && t.children.length > 0) {
                        flat = flat.concat(this.flattenTasks(t.children));
                    }
                });
                return flat;
            },

            toggleComplete(id, forceValue = null) {
                const map = this.state.maps.find(m => m.id === this.state.currentMapId);
                const info = this.findTask(map.tasks, id);
                const newVal = forceValue !== null ? forceValue : !info.node.completed;
                
                const setCompleteDeep = (task, val) => {
                    task.completed = val;
                    task.children.forEach(c => setCompleteDeep(c, val));
                };
                
                setCompleteDeep(info.node, newVal);

                if (!this.state.focusedTaskIds) this.state.focusedTaskIds = [];

                // Если задача выполнена и она была в списке сфокусированных
                if (newVal && this.state.focusedTaskIds.includes(id)) {
                    const idx = this.state.focusedTaskIds.indexOf(id);
                    
                    // Удаляем её из списка фокуса
                    this.state.focusedTaskIds.splice(idx, 1);
                    
                    // Если в очереди ещё остались задачи для фокуса
                    if (this.state.focusedTaskIds.length > 0) {
                        // Берем следующую по очереди (или первую, если завершили последнюю)
                        const nextIndex = idx < this.state.focusedTaskIds.length ? idx : 0;
                        const nextId = this.state.focusedTaskIds[nextIndex];
                        
                        // Делаем плавный скролл к следующей задаче с небольшой задержкой (чтобы DOM успел обновиться)
                        setTimeout(() => {
                            const el = document.getElementById('task-' + nextId);
                            if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        }, 50);
                    }
                }

                this.saveState(); this.render();
                AudioSys.play(newVal ? 'check' : 'uncheck');
            },

            toggleExpand(id) {
                const map = this.state.maps.find(m => m.id === this.state.currentMapId);
                const info = this.findTask(map.tasks, id);
                if (info) {
                    info.node.expanded = info.node.expanded === undefined ? false : !info.node.expanded;
                    this.saveState();
                    this.render();
                    AudioSys.play('action');
                }
			},

            // --- Movement (Вверх, Вниз, Внутрь, Наружу) ---
            moveTask(id, direction) {
                const map = this.state.maps.find(m => m.id === this.state.currentMapId);
                const info = this.findTask(map.tasks, id);
                const { node, parentArray, index, parent } = info;

                if (direction === 'up' && index > 0) {
                    [parentArray[index - 1], parentArray[index]] = [parentArray[index], parentArray[index - 1]];
                } else if (direction === 'down' && index < parentArray.length - 1) {
                    [parentArray[index + 1], parentArray[index]] = [parentArray[index], parentArray[index + 1]];
                } else if (direction === 'in' && index > 0) {
                    const prevSibling = parentArray[index - 1];
                    prevSibling.children.push(node);
                    parentArray.splice(index, 1);
                } else if (direction === 'out' && parent) {
                    const parentInfo = this.findTask(map.tasks, parent.id);
                    parentInfo.parentArray.splice(parentInfo.index + 1, 0, node);
                    parentArray.splice(index, 1);
                } else return;

                this.saveState(); this.render(); AudioSys.play('action');
            },

            findTask(tasks, id, parent = null, parentArray = null) {
                if(!parentArray) parentArray = tasks;
                for (let i = 0; i < tasks.length; i++) {
                    if (tasks[i].id === id) return { node: tasks[i], parent, parentArray, index: i };
                    if (tasks[i].children.length > 0) {
                        const res = this.findTask(tasks[i].children, id, tasks[i], tasks[i].children);
                        if (res) return res;
                    }
                }
                return null;
            },

            // --- Auto-Computation Logic ---
            computeTree(tasks) {
                let totalLeaves = 0;
                let completedLeaves = 0;

                tasks.forEach(task => {
                    if (task.children && task.children.length > 0) {
                        const stats = this.computeTree(task.children);
                        task.completed = (stats.total > 0 && stats.completed === stats.total);
                        task.stats = stats;
                        totalLeaves += stats.total;
                        completedLeaves += stats.completed;
                    } else {
                        task.stats = null;
                        totalLeaves += 1;
                        completedLeaves += task.completed ? 1 : 0;
                    }
                });

                return { total: totalLeaves, completed: completedLeaves };
            },

            // --- Rendering ---
            render() {
                this.renderMapList();
                const map = this.state.maps.find(m => m.id === this.state.currentMapId);
                if (!map) return;

                document.getElementById('map-title').innerText = map.name;
                
                const globalStats = this.computeTree(map.tasks);
                const percent = globalStats.total === 0 ? 0 : Math.round((globalStats.completed / globalStats.total) * 100);
                document.getElementById('global-stats').innerText = `Общий статус: ${globalStats.completed}/${globalStats.total} (${percent}%)`;

                const treeRoot = document.getElementById('tree-root');
                treeRoot.innerHTML = '';
                if(map.tasks.length > 0) {
                    treeRoot.appendChild(this.createTaskNodes(map.tasks));
                }
            },

            renderMapList() {
                const list = document.getElementById('map-list');
                list.innerHTML = '';
                this.state.maps.forEach(m => {
                    const li = document.createElement('li');
                    li.className = `map-item ${m.id === this.state.currentMapId ? 'active' : ''}`;
                    li.innerHTML = `
                        <span>${m.name}</span> 
                        <div style="display:flex; align-items:center;">
                            <button class="btn-edit" onclick="app.renameMap('${m.id}', event)">✎</button>
                            <button class="btn-delete" onclick="app.deleteMap('${m.id}', event)">✕</button>
                        </div>
                    `;
                    li.onclick = () => this.switchMap(m.id);
                    list.appendChild(li);
                });
            },

            createTaskNodes(tasks) {
                const ul = document.createElement('ul');
                tasks.forEach(task => {
                    const li = document.createElement('li');
                    li.className = 'task-item';
                    
                    const isExpanded = task.expanded !== false;
                    const hasChildren = task.children.length > 0;
                    
                    let statsHtml = '';
                    if (task.stats) {
                        const pct = task.stats.total === 0 ? 0 : Math.round((task.stats.completed / task.stats.total) * 100);
                        statsHtml = `<span class="task-stats">${task.stats.completed}/${task.stats.total} (${pct}%)</span>`;
                    }

                    const toggleBtn = hasChildren 
                        ? `<button class="btn-toggle" onclick="app.toggleExpand('${task.id}')">${isExpanded ? '▼' : '▶'}</button>`
                        : `<span class="btn-toggle"></span>`;

                    const inlineStyle = task.color ? `--node-custom-color: ${task.color};` : '';

                    li.innerHTML = `
                        <div id="task-${task.id}" class="task-content ${task.completed ? 'completed' : ''} ${(app.state.focusedTaskIds || []).includes(task.id) ? 'focused' : ''}" style="${inlineStyle}">
                            ${toggleBtn}
                            <input type="checkbox" ${task.completed ? 'checked' : ''} onclick="app.toggleComplete('${task.id}')">
                            <input type="text" class="task-text" value="${task.text.replace(/"/g, '&quot;')}" onblur="app.updateTaskText('${task.id}', this.value)">
                            ${statsHtml}
                            <div class="task-controls">
                                <input type="color" class="node-color-picker" value="${task.color || '#ffffff'}" onchange="app.updateTaskColor('${task.id}', this.value)" title="Цвет ветки">
                                <button onclick="app.moveTask('${task.id}', 'up')" title="Вверх">↑</button>
                                <button onclick="app.moveTask('${task.id}', 'down')" title="Вниз">↓</button>
                                <button onclick="app.moveTask('${task.id}', 'in')" title="Внутрь (Сделать дочерней)">→</button>
                                <button onclick="app.moveTask('${task.id}', 'out')" title="Наружу (Сделать сестринской)">←</button>
                                <button onclick="app.duplicateTask('${task.id}')" title="Дублировать">⎘</button>
                                <button onclick="app.addTask('${task.id}')" title="Добавить подветвь">+</button>
								<button onclick="app.focusTask('${task.id}')" title="Сфокусироваться">👁</button>
								<button onclick="app.addBulkTasks('${task.id}')" title="Добавить несколько веток">+📋</button>
								<button class="btn-delete" onclick="app.deleteTask('${task.id}')" title="Удалить">✕</button>
                            </div>
                        </div>
                    `;
                    
                    if (hasChildren) {
                        const childrenContainer = this.createTaskNodes(task.children);
                        if (!isExpanded) childrenContainer.classList.add('collapsed-content');
                        li.appendChild(childrenContainer);
                    }
                    ul.appendChild(li);
                });
                return ul;
            },

            // --- Import / Export ---
            exportBook() {
                this.downloadData(this.state, 'todo_book.json');
            },
            exportMap() {
                const map = this.state.maps.find(m => m.id === this.state.currentMapId);
                this.downloadData(map, `todo_map_${map.name}.json`);
            },
            downloadData(data, filename) {
                const blob = new Blob([JSON.stringify(data, null, 2)], {type: "application/json"});
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url; a.download = filename; a.click();
                URL.revokeObjectURL(url);
            },
            importBook(e) {
                this.handleFile(e, (data) => {
                    if(data.maps && Array.isArray(data.maps)) {
                        this.state = data;
                        this.history = []; this.historyIndex = -1;
                        this.saveState(true); this.init();
                    } else this.showAlert("Неверный формат книги.");
                });
            },
            importMap(e) {
                this.handleFile(e, (data) => {
                    if(data.id && data.tasks) {
                        data.id = this.generateId();
                        this.state.maps.push(data);
                        this.state.currentMapId = data.id;
                        this.applySettings(); // Мгновенно переключаем фон на импортированную карту
                        this.saveState(); this.render();
                    } else this.showAlert("Неверный формат карты.");
                });
            },
            handleFile(e, callback) {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    try { callback(JSON.parse(ev.target.result)); }
                    catch(err) { this.showAlert("Ошибка чтения файла"); }
                    e.target.value = '';
                };
                reader.readAsText(file);
            }
        };

        // Инициализация при загрузке страницы
        window.onload = () => app.init();
    </script>
</body>
</html>
